<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Math Studio K-12 | Interactive Learning Engine</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root,
      :root[data-theme="dark"] {
        --bg-page: #0a0a0f;
        --bg-panel: #13131a;
        --bg-card: #1c1c24;
        --border-color: #2a2a35;
        --text-main: #e2e2ec;
        --text-muted: #8e8e9f;
        --math-primary: #ffffff;
        --math-accent-1: #00f0ff;
        --math-accent-2: #ff3366;
        --math-accent-3: #00ff88;
        --math-accent-4: #bb88ff;
        --math-grid: #23232b;
        --canvas-bg: #000000;
        --grid-style-junior: radial-gradient(
          circle,
          #2a2a35 2px,
          transparent 2.5px
        );
      }

      :root[data-theme="light"] {
        --bg-page: #f0f4f8;
        --bg-panel: #ffffff;
        --bg-card: #f8fafc;
        --border-color: #cbd5e1;
        --text-main: #0f172a;
        --text-muted: #64748b;
        --math-primary: #0f172a;
        --math-accent-1: #0284c7;
        --math-accent-2: #e11d48;
        --math-accent-3: #16a34a;
        --math-accent-4: #7e22ce;
        --math-grid: #e2e8f0;
        --canvas-bg: #ffffff;
        --grid-style-junior: radial-gradient(
          circle,
          #cbd5e1 2px,
          transparent 2.5px
        );
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: var(--bg-page);
        font-family: "Inter", sans-serif;
        padding: clamp(0.5rem, 2vw, 1.5rem);
        color: var(--text-main);
        min-height: 100vh;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
        overflow-x: hidden;
      }

      /* Presentation Mode */
      body.presentation-mode {
        padding: 0;
      }
      body.presentation-mode .header-container,
      body.presentation-mode .pedagogy-header,
      body.presentation-mode .toolbar {
        display: none;
      }
      body.presentation-mode .app-container {
        max-width: 100%;
        height: 100vh;
        gap: 0;
      }
      body.presentation-mode .workspace {
        grid-template-columns: 1fr 350px;
        height: 100vh;
        gap: 0;
      }
      body.presentation-mode .canvas-wrapper {
        border-radius: 0;
        border: none;
        height: 100%;
      }
      body.presentation-mode canvas {
        height: 100%;
        max-height: calc(100vh - 180px);
      }
      body.presentation-mode .learning-panel {
        border-radius: 0;
        border: none;
      }

      .app-container {
        max-width: 1400px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: clamp(1rem, 2vw, 1.5rem);
      }

      /* Global Navigation & Search */
      .header-container {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border-color);
      }
      .header-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 1rem;
      }

      .brand h1 {
        font-size: clamp(1.2rem, 3vw, 1.6rem);
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .brand h1 span {
        color: var(--math-accent-1);
      }

      .global-controls {
        display: flex;
        gap: 0.8rem;
        flex: 1;
        justify-content: flex-end;
        align-items: center;
        flex-wrap: wrap;
      }
      .search-box,
      .grade-select {
        background: var(--bg-card);
        color: var(--text-main);
        border: 1px solid var(--border-color);
        padding: 0.6rem 1rem;
        border-radius: 8px;
        font-family: "Inter", sans-serif;
        font-size: 0.9rem;
        outline: none;
        transition: 0.2s;
        min-height: 40px; /* Touch target size */
      }
      .search-box {
        flex: 1;
        min-width: 200px;
        max-width: 300px;
      }
      .search-box:focus,
      .grade-select:focus {
        border-color: var(--math-accent-1);
        box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1);
      }

      .util-btn {
        background: transparent;
        border: 1px solid var(--border-color);
        color: var(--text-muted);
        padding: 0.5rem 0.8rem;
        border-radius: 8px;
        font-size: 0.85rem;
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        min-height: 40px;
        white-space: nowrap;
      }
      .util-btn:hover {
        color: var(--text-main);
        border-color: var(--text-muted);
      }

      /* Dynamic Topic Strip */
      .topic-nav-wrapper {
        position: relative;
        width: 100%;
        overflow: hidden;
      }
      .topic-nav {
        display: flex;
        gap: 0.5rem;
        overflow-x: auto;
        padding-bottom: 0.5rem;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
      }
      .topic-nav::-webkit-scrollbar {
        display: none;
      }
      .topic-btn {
        background: var(--bg-panel);
        border: 1px solid var(--border-color);
        color: var(--text-muted);
        padding: 0.6rem 1rem;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        white-space: nowrap;
        flex-shrink: 0;
        min-height: 40px;
      }
      .topic-btn:hover {
        background: var(--bg-card);
        color: var(--text-main);
      }
      .topic-btn.active {
        background: var(--math-accent-1);
        color: var(--canvas-bg);
        border-color: var(--math-accent-1);
        box-shadow: 0 0 12px rgba(2, 132, 199, 0.2);
      }
      .topic-badge {
        font-size: 0.65rem;
        padding: 0.15rem 0.4rem;
        border-radius: 12px;
        background: var(--border-color);
        color: var(--text-main);
        font-weight: 600;
      }
      .topic-btn.active .topic-badge {
        background: rgba(255, 255, 255, 0.2);
        color: var(--canvas-bg);
      }

      /* Workspace Layout */
      .workspace {
        display: grid;
        grid-template-columns: 1fr 400px;
        gap: clamp(1rem, 2vw, 1.5rem);
        align-items: start;
      }

      /* Canvas & Visuals */
      .canvas-wrapper {
        background: var(--bg-panel);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: clamp(0.8rem, 2vw, 1.5rem);
        display: flex;
        flex-direction: column;
        gap: 1rem;
        position: relative;
        width: 100%;
        overflow: hidden;
      }

      .equation-header {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }
      .live-equation {
        flex: 2;
        min-width: 250px;
        font-family: "JetBrains Mono", monospace;
        font-size: clamp(1rem, 2.5vw, 1.2rem);
        text-align: center;
        padding: 1rem;
        background: var(--bg-page);
        border-radius: 8px;
        border: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .solver-box {
        flex: 1.5;
        min-width: 200px;
        background: rgba(22, 163, 74, 0.05);
        border: 1px dashed var(--math-accent-3);
        border-radius: 8px;
        padding: 0.8rem;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.85rem;
        color: var(--text-muted);
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 0.3rem;
      }
      .solver-box strong {
        color: var(--math-accent-3);
        text-transform: uppercase;
        font-size: 0.7rem;
        letter-spacing: 0.5px;
      }

      .challenge-box {
        display: none;
        align-items: center;
        justify-content: space-between;
        background: rgba(217, 119, 6, 0.08);
        border: 1px solid rgba(217, 119, 6, 0.3);
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
        color: #d97706;
        transition: 0.3s;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      :root[data-theme="dark"] .challenge-box {
        color: #ffd700;
      }
      .challenge-box.active {
        display: flex;
      }
      .challenge-box.success {
        background: rgba(22, 163, 74, 0.1);
        border-color: var(--math-accent-3);
        color: var(--math-accent-3);
      }
      .challenge-status {
        font-weight: bold;
        font-family: monospace;
        margin-left: 1rem;
        white-space: nowrap;
      }
      .dice-btn {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        color: var(--text-main);
        border-radius: 6px;
        padding: 0.5rem;
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 40px;
        min-height: 40px;
      }
      .dice-btn:hover {
        background: var(--border-color);
        transform: scale(1.05);
      }

      canvas {
        width: 100%;
        height: auto;
        aspect-ratio: 2 / 1;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        cursor: crosshair;
        touch-action: none;
      }
      .canvas-junior {
        background-image: var(--grid-style-junior);
        background-size: 30px 30px;
        background-color: var(--canvas-bg);
        box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.02);
      }
      .canvas-senior {
        background: var(--canvas-bg);
        box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.1);
      }
      :root[data-theme="dark"] .canvas-senior {
        box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--bg-page);
        padding: 0.75rem 1rem;
        border-radius: 8px;
        flex-wrap: wrap;
        gap: 0.8rem;
      }
      .tool-group {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        flex-wrap: wrap;
      }
      .action-btn {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        color: var(--text-main);
        padding: 0.5rem 1rem;
        border-radius: 6px;
        font-size: 0.85rem;
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        min-height: 40px;
        white-space: nowrap;
        flex: 1;
      }
      .action-btn:hover {
        background: var(--border-color);
      }
      .action-btn.toggle-on {
        background: var(--math-accent-1);
        color: var(--canvas-bg);
        border-color: var(--math-accent-1);
      }

      /* Right: Learning Panel & Controls */
      .learning-panel {
        background: var(--bg-panel);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        width: 100%;
      }
      .pedagogy-header {
        padding: clamp(1rem, 2vw, 1.5rem);
        background: var(--bg-card);
        border-bottom: 1px solid var(--border-color);
      }
      :root[data-theme="dark"] .pedagogy-header {
        background: linear-gradient(
          180deg,
          rgba(28, 28, 36, 1) 0%,
          rgba(19, 19, 26, 1) 100%
        );
      }

      .topic-meta {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 0.5rem;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .topic-meta h2 {
        font-size: 1.2rem;
      }
      .career-link {
        font-size: 0.75rem;
        background: rgba(187, 136, 255, 0.1);
        color: var(--math-accent-4);
        padding: 0.3rem 0.6rem;
        border-radius: 30px;
        border: 1px solid rgba(187, 136, 255, 0.3);
        white-space: nowrap;
      }
      .pedagogy-header p {
        color: var(--text-muted);
        font-size: 0.9rem;
        line-height: 1.5;
        margin-bottom: 1rem;
      }

      .contact-box {
        margin-top: 1rem;
        padding: 0.8rem;
        background: rgba(126, 34, 206, 0.05);
        border: 1px dashed rgba(126, 34, 206, 0.3);
        border-radius: 8px;
        font-size: 0.85rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .contact-btn {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        color: var(--text-main);
        text-decoration: none;
        padding: 0.5rem 0.8rem;
        border-radius: 6px;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        transition: 0.2s;
        min-height: 40px;
        width: 100%;
      }
      @media (min-width: 480px) {
        .contact-btn {
          width: auto;
        }
      }
      .contact-btn:hover {
        border-color: var(--math-accent-4);
        color: var(--math-accent-4);
      }

      .controls-section {
        padding: clamp(1rem, 2vw, 1.5rem);
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }
      .controls-title {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-muted);
        font-weight: 600;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
      }
      .control-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .control-label {
        font-size: 0.9rem;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .color-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
        flex-shrink: 0;
      }

      .slider-value {
        font-family: "JetBrains Mono", monospace;
        background: var(--bg-card);
        padding: 0.4rem 0.6rem;
        border-radius: 4px;
        font-size: 0.85rem;
        border: 1px solid var(--border-color);
        width: 80px;
        text-align: right;
        color: var(--text-main);
        outline: none;
        cursor: ew-resize;
        transition: border-color 0.2s;
        min-height: 38px;
      }
      .slider-value:focus {
        border-color: var(--math-accent-1);
        cursor: text;
      }
      .slider-value::-webkit-outer-spin-button,
      .slider-value::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .slider-value[type="number"] {
        appearance: textfield;
      }

      input[type="range"] {
        appearance: none;
        width: 100%;
        height: 8px;
        background: var(--bg-page);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        outline: none;
        margin: 0.5rem 0;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--text-main);
        cursor: pointer;
        transition: transform 0.1s;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }
      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.1);
      }

      #toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--math-accent-3);
        color: #000;
        padding: 0.8rem 1.5rem;
        border-radius: 30px;
        font-weight: 600;
        opacity: 0;
        transition: 0.3s;
        z-index: 1000;
      }
      #toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      /* Responsive Breakpoints */
      @media (max-width: 1024px) {
        .workspace {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 768px) {
        .header-top {
          flex-direction: column;
          align-items: stretch;
        }
        .global-controls {
          justify-content: flex-start;
        }
        .search-box {
          max-width: 100%;
        }
        .toolbar {
          justify-content: center;
        }
        .tool-group {
          width: 100%;
          justify-content: space-between;
        }
        canvas {
          aspect-ratio: 1.5 / 1;
        } /* Taller canvas on mobile */
      }
      @media (max-width: 480px) {
        .equation-header {
          flex-direction: column;
        }
        .tool-group {
          flex-direction: column;
          align-items: stretch;
        }
        .action-btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <!-- System Layer 4: Global Search & Navigation -->
      <header class="header-container">
        <div class="header-top">
          <div class="brand">
            <h1>Math<span>Studio</span></h1>
          </div>
          <div class="global-controls">
            <input
              type="text"
              id="globalSearch"
              class="search-box"
              placeholder="Search K-12 topics..."
              autocomplete="off"
            />
            <select id="gradeFilter" class="grade-select">
              <option value="all">All Grades (K-12)</option>
              <option value="junior">Junior (Class 1-5)</option>
              <option value="middle">Middle (Class 6-8)</option>
              <option value="senior">Senior (Class 9-12)</option>
            </select>
            <button class="util-btn" id="themeToggleBtn">🌙 Theme</button>
            <button class="util-btn" id="presentModeBtn">🖧 Present</button>
            <button class="util-btn" id="shareLinkBtn">🔗 Share</button>
          </div>
        </div>
        <!-- Dynamic Content Registry Strip -->
        <div class="topic-nav-wrapper">
          <nav class="topic-nav" id="topicStrip"></nav>
        </div>
      </header>

      <main class="workspace">
        <!-- Left Column: Visuals & Templates -->
        <div class="canvas-wrapper">
          <div class="equation-container">
            <div class="equation-header">
              <div class="live-equation" id="liveEquation"></div>
              <div class="solver-box" id="solverBox">
                <!-- Step-by-Step Solver Output -->
              </div>
            </div>

            <div class="challenge-box" id="challengeBox">
              <div
                style="
                  flex: 1;
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  padding-right: 1rem;
                "
              >
                <span class="challenge-text" id="challengeText"
                  >Target: Find the goal.</span
                >
                <span class="challenge-status" id="challengeStatus"
                  >[ Pending ]</span
                >
              </div>
              <button
                class="dice-btn"
                id="nextChallengeBtn"
                title="Shuffle Challenge"
              >
                🎲
              </button>
            </div>
          </div>

          <!-- Touch-action:none prevents scroll on mobile when interacting with canvas -->
          <canvas id="mainCanvas"></canvas>

          <div class="toolbar">
            <div class="tool-group">
              <button id="zoomInBtn" class="action-btn" title="Zoom In">
                <span>➕</span> In
              </button>
              <button id="zoomOutBtn" class="action-btn" title="Zoom Out">
                <span>➖</span> Out
              </button>
            </div>
            <div class="tool-group">
              <button id="practiceModeBtn" class="action-btn">
                <span>🎯</span> Practice Mode
              </button>
            </div>
          </div>
        </div>

        <!-- Right Column: Universal Template Panel -->
        <aside class="learning-panel">
          <div class="pedagogy-header">
            <div class="topic-meta">
              <h2 id="panelTitle">Topic Title</h2>
              <div
                class="career-link"
                id="careerLink"
                title="Real World Context"
              >
                🚀 Career
              </div>
            </div>
            <p id="panelDesc">Topic description goes here.</p>
            <div class="contact-box">
              <span>Have a question or feedback?</span>
              <a href="mailto:garvitjoshi46@gmail.com" class="contact-btn"
                >✉️ Mail Me</a
              >
            </div>
          </div>
          <div class="controls-section">
            <div class="controls-title">Variables & Configuration</div>
            <div id="dynamicSliders">
              <!-- Auto-generated by Engine -->
            </div>
          </div>
        </aside>
      </main>
    </div>

    <div id="toast">Copied!</div>

    <script>
      (function () {
        // --- ENTERPRISE TELEMETRY & ANALYTICS ENGINE ---
        // Simulates tracking user behavior for UX optimization and cohort analysis.
        const TelemetryEngine = {
          sessionId: "sess_" + Math.random().toString(36).substr(2, 9),
          initTime: Date.now(),
          eventQueue: [],

          // Debounce map for sliders so we don't spam analytics
          debounceTimers: {},

          track: function (eventName, payload = {}) {
            const eventData = {
              timestamp: new Date().toISOString(),
              session_id: this.sessionId,
              time_on_page_ms: Date.now() - this.initTime,
              event: eventName,
              screen_width: window.innerWidth,
              ...payload,
            };
            this.eventQueue.push(eventData);

            // Console logging styled to look like an analytics stream for developer verification
            console.log(
              `%c[📊 Telemetry] %c${eventName}`,
              "color: #bb88ff; font-weight: bold;",
              "color: inherit;",
              eventData,
            );

            // In a real environment, this would hit: navigator.sendBeacon('/api/track', JSON.stringify(this.eventQueue))
          },

          trackParamChange: function (topicId, paramId, value) {
            const key = `${topicId}_${paramId}`;
            clearTimeout(this.debounceTimers[key]);
            this.debounceTimers[key] = setTimeout(() => {
              this.track("parameter_adjusted", {
                topic: topicId,
                parameter: paramId,
                final_value: value,
              });
            }, 800); // 800ms debounce
          },
        };

        function generateChallenge() {
          const t = MathRegistry.find((x) => x.id === AppState.topicId);
          let targetA = Math.floor(Math.random() * 5) + 2;
          let targetB = Math.floor(Math.random() * 5) + 2;

          if (t.id === "g8_pyth")
            return {
              text: `Set the triangle to have sides ${targetA * 2} and ${targetA * 2}.`,
              check: (p) => p.a === targetA * 2 && p.b === targetA * 2,
            };
          if (t.id === "g8_scat")
            return {
              text: `Create a perfect negative correlation (r = -1.0).`,
              check: (p) => p.r === -1.0,
            };
          if (t.id === "g9_dist")
            return {
              text: `Make the distance exactly 5 units (Hint: 3-4-5 triangle).`,
              check: (p) =>
                Math.sqrt((p.x2 - p.x1) ** 2 + (p.y2 - p.y1) ** 2) === 5,
            };
          if (t.id === "g11_deriv")
            return {
              text: `Find a point where the derivative (slope) is exactly 0.0.`,
              check: (p) => Math.abs(2 * p.a * p.x) < 0.1,
            };
          if (t.id === "g12_int")
            return {
              text: `Set the bounds symmetrically (e.g. -3 and 3).`,
              check: (p) => p.x1 === -p.x2 && p.x1 !== 0,
            };
          if (t.id === "g12_vec")
            return {
              text: `Make Vector A and B perpendicular (Dot Product = 0).`,
              check: (p) => p.x1 * p.x2 + p.y1 * p.y2 === 0,
            };

          return {
            text: "Explore the parameters and observe the visual changes.",
            check: () => true,
          };

        // --- SYSTEM LAYER 3: UI & NAVIGATION ---
        function syncURL() {
          const url = new URL(window.location);
          url.searchParams.set("grade", AppState.filter);
          if (AppState.search) url.searchParams.set("q", AppState.search);
          else url.searchParams.delete("q");
          url.searchParams.set("topic", AppState.topicId);
          for (let key in AppState.params)
            url.searchParams.set(key, AppState.params[key]);
          try {
            window.history.replaceState(null, "", url);
          } catch (e) {}
        }

        function loadFromURL() {
          try {
            const p = new URLSearchParams(window.location.search);
            if (p.has("grade")) AppState.filter = p.get("grade");
            if (p.has("q")) AppState.search = p.get("q");
            if (
              p.has("topic") &&
              MathRegistry.find((x) => x.id === p.get("topic"))
            )
              AppState.topicId = p.get("topic");

            document.getElementById("gradeFilter").value = AppState.filter;
            document.getElementById("globalSearch").value = AppState.search;

            const topic = MathRegistry.find((x) => x.id === AppState.topicId);
            AppState.params = {};
            topic.controls.forEach((c) => {
              AppState.params[c.id] = p.has(c.id)
                ? parseFloat(p.get(c.id))
                : c.def;
            });
          } catch (e) {}
        }

        function renderNavigation() {
          const strip = document.getElementById("topicStrip");
          strip.innerHTML = "";
          const s = AppState.search.toLowerCase();

          MathRegistry.forEach((topic) => {
            const matchSearch =
              topic.title.toLowerCase().includes(s) ||
              topic.domain.toLowerCase().includes(s);
            const matchGrade =
              AppState.filter === "all" || topic.category === AppState.filter;

            if (matchSearch && matchGrade) {
              const btn = document.createElement("button");
              btn.className = `topic-btn ${topic.id === AppState.topicId ? "active" : ""}`;
              btn.innerHTML = `${topic.title} <span class="topic-badge">Cl. ${topic.grade}</span>`;
              btn.onclick = () => {
                if (AppState.topicId !== topic.id) {
                  AppState.topicId = topic.id;
                  AppState.params = {};
                  AppState.zoom = 1.0;
                  AppState.challengeSolvedFlag = false;
                  topic.controls.forEach(

                  AppState.currentChallenge = generateChallenge();

                  TelemetryEngine.track("topic_viewed", {
                    topic: topic.id,
                    grade: topic.grade,
                  });
                  syncURL();
                  buildTopicUI();

              strip.appendChild(btn);

          canvas.className =

            topic.category === "middle" ||
            topic.template === "coordinate_graph"
              ? "canvas-senior"
              : "canvas-junior";

          const container = document.getElementById("dynamicSliders");
          container.innerHTML = "";

          topic.controls.forEach((c) => {
            const val = AppState.params[c.id];
            const stepFix = c.step % 1 === 0 ? 0 : 2;

            const group = document.createElement("div");
            group.className = "control-group";
            group.innerHTML = `
              <div class="control-header">
                <span class="control-label"><span class="color-dot" style="background: ${c.color};"></span>${c.label}</span>
                <input type="number" class="slider-value" id="val_${c.id}" min="${c.min}" max="${c.max}" step="${c.step}" value="${val.toFixed(stepFix)}">
              </div>
              <input type="range" id="slider_${c.id}" min="${c.min}" max="${c.max}" step="${c.step}" value="${val}">
            `;
            container.appendChild(group);

            const sliderEl = document.getElementById(`slider_${c.id}`);
            const inputEl = document.getElementById(`val_${c.id}`);

            const update = (v) => {
              let safeV = Math.max(c.min, Math.min(c.max, parseFloat(v)));
              if (isNaN(safeV)) safeV = c.def;
              AppState.params[c.id] = safeV;
              sliderEl.value = safeV;
              inputEl.value = safeV.toFixed(stepFix);

              TelemetryEngine.trackParamChange(AppState.topicId, c.id, safeV);

              syncURL();
              drawCanvas();
            };

            sliderEl.addEventListener("input", (e) => update(e.target.value));
            inputEl.addEventListener("change", (e) => update(e.target.value));

            let isDragging = false,
              startX,
              startVal;
            const startDrag = (e) => {
              isDragging = true;
              startX = e.clientX || (e.touches && e.touches[0].clientX);
              startVal = parseFloat(inputEl.value);
              e.preventDefault();
              inputEl.focus();
            };
            const onDrag = (e) => {
              if (!isDragging) return;
              let currentX = e.clientX || (e.touches && e.touches[0].clientX);
              if (!currentX) return;
              update(
                startVal + (currentX - startX) * (c.step >= 1 ? 0.5 : 0.02),
              );
            };
            const endDrag = () => {
              isDragging = false;
            };

            inputEl.addEventListener("mousedown", startDrag);
            inputEl.addEventListener("touchstart", startDrag, {
              passive: false,
            });
            window.addEventListener("mousemove", onDrag);
            window.addEventListener("touchmove", onDrag, { passive: false });
            window.addEventListener("mouseup", endDrag);
            window.addEventListener("touchend", endDrag);
          });

          renderNavigation();
          drawCanvas();
        }

        // --- SYSTEM LAYER 4: ADVANCED UNIVERSAL TEMPLATE RENDERER ---

        function mapX(x, xMin, xMax, w) {
          return ((x - xMin) / (xMax - xMin)) * w;
        }
        function mapY(y, yMin, yMax, h) {
          return h - ((y - yMin) / (yMax - yMin)) * h;
        }
        function invMapX(px, xMin, xMax, w) {
          return (px / w) * (xMax - xMin) + xMin;
        }
        function invMapY(py, yMin, yMax, h) {
          return ((h - py) / h) * (yMax - yMin) + yMin;
        }

        function drawAxes(ctx, w, h, xMin, xMax, yMin, yMax) {
          ctx.strokeStyle = getStyle("--math-grid");
          ctx.lineWidth = 1;
          ctx.fillStyle = getStyle("--text-muted");
          ctx.font = "10px 'JetBrains Mono'";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";

          let xRange = xMax - xMin;
          let xStep = 1;
          if (xRange >= 100) xStep = 10;
          else if (xRange >= 40) xStep = 5;
          else if (xRange >= 20) xStep = 2;
          else if (xRange < 10) xStep = 0.5;
          else if (xRange < 4) xStep = 0.2;

          let yStep = xStep; // Square aspect ratio
          let zeroX = mapX(0, xMin, xMax, w),
            zeroY = mapY(0, yMin, yMax, h);

          // Grid & Numbers
          for (
            let x = Math.ceil(xMin / xStep) * xStep;
            x <= Math.floor(xMax);
            x += xStep
          ) {
            let px = mapX(x, xMin, xMax, w);
            ctx.beginPath();
            ctx.moveTo(px, 0);
            ctx.lineTo(px, h);
            ctx.stroke();
            if (Math.abs(x) > 0.001) {
              ctx.fillText(
                Number.isInteger(x) ? x : x.toFixed(1),
                px,
                Math.min(Math.max(zeroY + 12, 12), h - 12),
              );
            }
          }
          for (
            let y = Math.ceil(yMin / yStep) * yStep;
            y <= Math.floor(yMax);
            y += yStep
          ) {
            let py = mapY(y, yMin, yMax, h);
            ctx.beginPath();
            ctx.moveTo(0, py);
            ctx.lineTo(w, py);
            ctx.stroke();
            if (Math.abs(y) > 0.001) {
              ctx.textAlign = "right";
              ctx.fillText(
                Number.isInteger(y) ? y : y.toFixed(1),
                Math.min(Math.max(zeroX - 6, 30), w - 6),
                py,
              );
              ctx.textAlign = "center";
            }
          }

          // Main Axes
          ctx.strokeStyle = getStyle("--border-color");
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(zeroX, 0);
          ctx.lineTo(zeroX, h);
          ctx.moveTo(0, zeroY);
          ctx.lineTo(w, zeroY);
          ctx.stroke();

          ctx.fillStyle = getStyle("--text-main");
          ctx.font = "bold 12px 'JetBrains Mono'";
          ctx.textAlign = "left";
          ctx.fillText("0", zeroX + 4, zeroY - 8);
          ctx.fillText("X", w - 15, zeroY - 12);
          ctx.fillText("Y", zeroX + 8, 15);

          // Reset styling
          ctx.textAlign = "left";
          ctx.textBaseline = "alphabetic";
        }

        function drawArrow(ctx, fromx, fromy, tox, toy, color, width = 2) {
          let headlen = 12;
          let angle = Math.atan2(toy - fromy, tox - fromx);
          ctx.beginPath();
          ctx.strokeStyle = color;
          ctx.lineWidth = width;
          ctx.moveTo(fromx, fromy);
          ctx.lineTo(tox, toy);
          ctx.lineTo(
            tox - headlen * Math.cos(angle - Math.PI / 6),
            toy - headlen * Math.sin(angle - Math.PI / 6),
          );
          ctx.moveTo(tox, toy);
          ctx.lineTo(
            tox - headlen * Math.cos(angle + Math.PI / 6),
            toy - headlen * Math.sin(angle + Math.PI / 6),
          );
          ctx.stroke();
        }

        function drawCanvas() {
          const rect = canvas.getBoundingClientRect();
          // Dynamic aspect ratio adjustments for mobile portrait viewing
          const isMobile = window.innerWidth <= 768;
          canvas.width = rect.width * dpr || 800 * dpr;
          canvas.height =
            (rect.width / (isMobile ? 1.5 : 2)) * dpr || 400 * dpr;
          ctx.scale(dpr, dpr);
          const w = canvas.width / dpr,
            h = canvas.height / dpr;
          ctx.clearRect(0, 0, w, h);

          const topic = MathRegistry.find((x) => x.id === AppState.topicId);
          const p = AppState.params;
          const eqDiv = document.getElementById("liveEquation");
          const solverDiv = document.getElementById("solverBox");

          // Basic Templates (Pies, Bars)
          if (topic.template === "visual_pie") {
            let n = p.num || 1,
              d = p.den || 1;
            eqDiv.innerHTML = `<span style="color:var(--math-accent-1)">${n}</span> / <span style="color:var(--math-accent-2)">${d}</span>`;
            solverDiv.innerHTML = `<strong>Fraction Analysis</strong>Numerator = ${n}<br>Denominator = ${d}<br>Decimal ≈ ${(n / d).toFixed(2)}`;
            const cx = w / 2,
              cy = h / 2,
              r = (Math.min(w, h) * 0.4) / AppState.zoom,
              sliceAngle = (Math.PI * 2) / d;
            for (let i = 0; i < d; i++) {
              ctx.beginPath();
              ctx.moveTo(cx, cy);
              ctx.arc(cx, cy, r, i * sliceAngle, (i + 1) * sliceAngle);
              ctx.lineTo(cx, cy);
              ctx.fillStyle =
                i < n ? getStyle("--math-accent-1") : getStyle("--bg-page");
              ctx.fill();
              ctx.strokeStyle = getStyle("--border-color");
              ctx.lineWidth = 1;
              ctx.stroke();
            }
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.strokeStyle = getStyle("--text-main");
            ctx.lineWidth = 2;
            ctx.stroke();
          } else if (topic.template === "comparative_bar") {
            const total = p.a + p.b;
            eqDiv.innerHTML = `<span style="color:var(--math-accent-1)">A: ${p.a}</span> &nbsp;|&nbsp; <span style="color:var(--math-accent-2)">B: ${p.b}</span>`;
            solverDiv.innerHTML = `<strong>Ratio & Stats</strong>Total = ${total}<br>A is ${((p.a / total) * 100).toFixed(1)}%<br>B is ${((p.b / total) * 100).toFixed(1)}%`;
            const barW = (w * 0.7) / AppState.zoom,
              barH = 60 / AppState.zoom,
              startX = (w - barW) / 2,
              startY = h / 2 - barH / 2;
            const wA = (p.a / total) * barW,
              wB = (p.b / total) * barW;
            ctx.fillStyle = getStyle("--math-accent-1");
            ctx.fillRect(startX, startY, wA, barH);
            ctx.fillStyle = "#fff";
            ctx.font = "bold 16px Inter";
            if (wA > 25)
              ctx.fillText(p.a, startX + wA / 2 - 5, startY + barH / 2 + 5);
            ctx.fillStyle = getStyle("--math-accent-2");
            ctx.fillRect(startX + wA, startY, wB, barH);
            if (wB > 25)
              ctx.fillText(
                p.b,
                startX + wA + wB / 2 - 5,
                startY + barH / 2 + 5,
              );
          }

          // Number Line
          else if (topic.template === "number_line") {
            const z = AppState.zoom;
            const minX = -15 * z,
              maxX = 15 * z;
            let val = p.a !== undefined ? p.a : p.x;
            let val2 = p.b || 0;
            let sum = val + val2;

            eqDiv.innerHTML = `${val} ${val2 !== 0 ? (val2 > 0 ? "+ " + val2 : "- " + Math.abs(val2)) + ' = <span style="color:var(--math-accent-3)">' + sum + "</span>" : ""}`;
            solverDiv.innerHTML = `<strong>Linear Movement</strong>Start at origin (0).<br>Move to ${val}.<br>${val2 !== 0 ? "Then move " + val2 + " units." : ""}`;

            const lineY = h / 2;
            ctx.beginPath();
            ctx.moveTo(20, lineY);
            ctx.lineTo(w - 20, lineY);
            ctx.strokeStyle = getStyle("--text-main");
            ctx.lineWidth = 2;
            ctx.stroke();

            let xRange = maxX - minX;
            let xStep = 1;
            if (xRange >= 100) xStep = 10;
            else if (xRange >= 40) xStep = 5;
            else if (xRange >= 20) xStep = 2;
            else if (xRange < 10) xStep = 0.5;
            else if (xRange < 4) xStep = 0.2;

            ctx.fillStyle = getStyle("--text-muted");
            ctx.font = "12px Inter";
            ctx.textAlign = "center";
            for (
              let i = Math.ceil(minX / xStep) * xStep;
              i <= Math.floor(maxX);
              i += xStep
            ) {
              let px = mapX(i, minX, maxX, w - 40) + 20;
              ctx.beginPath();
              ctx.moveTo(px, lineY - 5);
              ctx.lineTo(px, lineY + 5);
              ctx.stroke();
              ctx.fillText(
                Number.isInteger(i) ? i : i.toFixed(1),
                px,
                lineY + 20,
              );
            }

            let startX = mapX(0, minX, maxX, w - 40) + 20;
            let px1 = mapX(val, minX, maxX, w - 40) + 20;

            // Draw arc 1
            ctx.beginPath();
            ctx.moveTo(startX, lineY);
            ctx.quadraticCurveTo(
              startX + (px1 - startX) / 2,
              lineY - 40,
              px1,
              lineY,
            );
            ctx.strokeStyle = getStyle("--math-accent-1");
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(px1, lineY, 5, 0, Math.PI * 2);
            ctx.fillStyle = getStyle("--math-accent-1");
            ctx.fill();

            if (val2 !== 0) {
              let px2 = mapX(sum, minX, maxX, w - 40) + 20;
              ctx.beginPath();
              ctx.moveTo(px1, lineY);
              ctx.quadraticCurveTo(
                px1 + (px2 - px1) / 2,
                lineY - 40,
                px2,
                lineY,
              );
              ctx.strokeStyle = getStyle("--math-accent-2");
              ctx.stroke();
              ctx.beginPath();
              ctx.arc(px2, lineY, 5, 0, Math.PI * 2);
              ctx.fillStyle = getStyle("--math-accent-3");
              ctx.fill();
            }
            ctx.textAlign = "left"; // reset
          } else if (topic.template === "geometry_2d") {
            let area = p.w * p.h;
            eqDiv.innerHTML = `Area = <span style="color:var(--math-accent-3)">${area.toFixed(1)} units²</span>`;
            solverDiv.innerHTML = `<strong>Mensuration</strong>Formula: W × H<br>${p.w} × ${p.h}`;

            const cx = w / 2,
              cy = h / 2;
            const scale = 1 / AppState.zoom;
            ctx.fillStyle = getStyle("--math-accent-1") + "33";
            ctx.strokeStyle = getStyle("--math-accent-1");
            ctx.lineWidth = 3;

            ctx.beginPath();
            let wPx = p.w * 10 * scale,
              hPx = p.h * 10 * scale;
            ctx.rect(cx - wPx / 2, cy - hPx / 2, wPx, hPx);
            ctx.fill();
            ctx.stroke();
          }

          // ADVANCED COORDINATE TEMPLATES (Classes 8-12)
          else if (
            topic.template === "coordinate_graph" ||
            topic.category === "senior" ||
            topic.category === "middle"
          ) {
            const z = AppState.zoom;
            const xMin = -10 * z,
              xMax = 10 * z,
              yMin = -10 * z * (h / w),
              yMax = 10 * z * (h / w); // Adjust Y domain based on aspect ratio

            drawAxes(ctx, w, h, xMin, xMax, yMin, yMax);

            // Cl. 8: Pythagorean Theorem
            if (topic.id === "g8_pyth") {
              const c = Math.sqrt(p.a * p.a + p.b * p.b);
              eqDiv.innerHTML = `<span style="color:var(--math-accent-1)">${p.a}²</span> + <span style="color:var(--math-accent-2)">${p.b}²</span> = <span style="color:var(--math-accent-4)">${c.toFixed(2)}²</span>`;
              solverDiv.innerHTML = `<strong>Proof</strong>Area A = ${p.a * p.a}<br>Area B = ${p.b * p.b}<br>Area C = ${p.a * p.a + p.b * p.b} = c²`;

              const cx = mapX(0, xMin, xMax, w),
                cy = mapY(0, yMin, yMax, h);
              const unit = w / (xMax - xMin);
              const aPx = p.a * unit,
                bPx = p.b * unit,
                cPx = c * unit;

              ctx.beginPath();
              ctx.moveTo(cx, cy);
              ctx.lineTo(cx + aPx, cy);
              ctx.lineTo(cx, cy - bPx);
              ctx.closePath();
              ctx.fillStyle = getStyle("--math-primary") + "4D";
              ctx.fill();
              ctx.strokeStyle = getStyle("--math-primary");
              ctx.lineWidth = 2;
              ctx.stroke();

              ctx.fillStyle = getStyle("--math-accent-1") + "66";
              ctx.fillRect(cx, cy, aPx, aPx);
              ctx.strokeStyle = getStyle("--math-accent-1");
              ctx.strokeRect(cx, cy, aPx, aPx);
              ctx.fillStyle = getStyle("--text-main");
              ctx.font = "bold 14px Inter";
              ctx.fillText(
                `a²=${p.a * p.a}`,
                cx + aPx / 2 - 15,
                cy + aPx / 2 + 5,
              );

              ctx.fillStyle = getStyle("--math-accent-2") + "66";
              ctx.fillRect(cx - bPx, cy - bPx, bPx, bPx);
              ctx.strokeStyle = getStyle("--math-accent-2");
              ctx.strokeRect(cx - bPx, cy - bPx, bPx, bPx);
              ctx.fillStyle = getStyle("--text-main");
              ctx.fillText(
                `b²=${p.b * p.b}`,
                cx - bPx / 2 - 20,
                cy - bPx / 2 + 5,
              );

              ctx.save();
              ctx.translate(cx + aPx, cy);
              ctx.rotate(Math.atan2(-bPx, -aPx));
              ctx.fillStyle = getStyle("--math-accent-4") + "66";
              ctx.fillRect(0, 0, cPx, cPx);
              ctx.strokeStyle = getStyle("--math-accent-4");
              ctx.strokeRect(0, 0, cPx, cPx);
              ctx.fillStyle = getStyle("--text-main");
              ctx.fillText(
                `c²=${(c * c).toFixed(0)}`,
                cPx / 2 - 20,
                cPx / 2 + 5,
              );
              ctx.restore();
            }

            // Cl. 8: Scatter Plots & Regression
            else if (topic.id === "g8_scat") {
              eqDiv.innerHTML = `Correlation r = <span style="color:var(--math-accent-1)">${p.r.toFixed(2)}</span>`;
              solverDiv.innerHTML = `<strong>Regression Line</strong>y = ${p.r.toFixed(2)}x + ${p.b}<br>Noise factor inverse to |r|`;

              const prng = PRNG(12345);
              ctx.fillStyle = getStyle("--math-primary") + "CC";
              for (let i = 0; i < 40; i++) {
                let x = -9 + i * 0.45;
                let noise = (prng() - 0.5) * 15 * (1 - Math.abs(p.r));
                let y = p.r * x + p.b + noise;
                ctx.beginPath();
                ctx.arc(
                  mapX(x, xMin, xMax, w),
                  mapY(y, yMin, yMax, h),
                  4,
                  0,
                  Math.PI * 2,
                );
                ctx.fill();
              }
              ctx.beginPath();
              ctx.strokeStyle = getStyle("--math-accent-1");
              ctx.lineWidth = 3;
              ctx.moveTo(
                mapX(xMin, xMin, xMax, w),
                mapY(p.r * xMin + p.b, yMin, yMax, h),
              );
              ctx.lineTo(
                mapX(xMax, xMin, xMax, w),
                mapY(p.r * xMax + p.b, yMin, yMax, h),
              );
              ctx.stroke();
            }

            // Cl. 8: Systems of Eq
            else if (topic.id === "g8_sys") {
              eqDiv.innerHTML = `<span style="color:var(--math-accent-1)">y = ${p.m1}x + ${p.b1}</span> | <span style="color:var(--math-accent-2)">y = ${p.m2}x + ${p.b2}</span>`;
              ctx.beginPath();
              ctx.strokeStyle = getStyle("--math-accent-1");
              ctx.lineWidth = 3;
              ctx.moveTo(
                mapX(xMin, xMin, xMax, w),
                mapY(p.m1 * xMin + p.b1, yMin, yMax, h),
              );
              ctx.lineTo(
                mapX(xMax, xMin, xMax, w),
                mapY(p.m1 * xMax + p.b1, yMin, yMax, h),
              );
              ctx.stroke();

              ctx.beginPath();
              ctx.strokeStyle = getStyle("--math-accent-2");
              ctx.lineWidth = 3;
              ctx.moveTo(
                mapX(xMin, xMin, xMax, w),
                mapY(p.m2 * xMin + p.b2, yMin, yMax, h),
              );
              ctx.lineTo(
                mapX(xMax, xMin, xMax, w),
                mapY(p.m2 * xMax + p.b2, yMin, yMax, h),
              );
              ctx.stroke();

              if (Math.abs(p.m1 - p.m2) > 0.001) {
                let xInt = (p.b2 - p.b1) / (p.m1 - p.m2);
                let yInt = p.m1 * xInt + p.b1;
                solverDiv.innerHTML = `<strong>Substitution</strong>${p.m1}x + ${p.b1} = ${p.m2}x + ${p.b2}<br>${(p.m1 - p.m2).toFixed(1)}x = ${(p.b2 - p.b1).toFixed(1)}<br>x = ${xInt.toFixed(2)}, y = ${yInt.toFixed(2)}`;
                if (
                  xInt >= xMin &&
                  xInt <= xMax &&
                  yInt >= yMin &&
                  yInt <= yMax
                ) {
                  let ix = mapX(xInt, xMin, xMax, w),
                    iy = mapY(yInt, yMin, yMax, h);
                  ctx.beginPath();
                  ctx.fillStyle = getStyle("--math-accent-3") + "66";
                  ctx.arc(ix, iy, 12, 0, 2 * Math.PI);
                  ctx.fill();
                  ctx.beginPath();
                  ctx.fillStyle = getStyle("--math-accent-3");
                  ctx.arc(ix, iy, 5, 0, 2 * Math.PI);
                  ctx.fill();
                  ctx.fillStyle = getStyle("--text-main");
                  ctx.font = "bold 13px 'JetBrains Mono'";
                  ctx.fillText(
                    `(${xInt.toFixed(1)}, ${yInt.toFixed(1)})`,
                    ix + 15,
                    iy - 15,
                  );
                }
              } else {
                solverDiv.innerHTML = `<strong>Analysis</strong>Slopes are equal (${p.m1}).<br>Lines are parallel.<br>No Solution.`;
              }
            }

            // Cl. 9: Distance Formula
            else if (topic.id === "g9_dist") {
              const d = Math.sqrt((p.x2 - p.x1) ** 2 + (p.y2 - p.y1) ** 2);
              eqDiv.innerHTML = `d = √(${p.x2 - p.x1}² + ${p.y2 - p.y1}²) = <span style="color:var(--math-accent-3)">${d.toFixed(2)}</span>`;
              solverDiv.innerHTML = `<strong>Pythagoras on Grid</strong>Δx = ${Math.abs(p.x2 - p.x1)}, Δy = ${Math.abs(p.y2 - p.y1)}<br>d² = Δx² + Δy²`;

              const px1 = mapX(p.x1, xMin, xMax, w),
                py1 = mapY(p.y1, yMin, yMax, h);
              const px2 = mapX(p.x2, xMin, xMax, w),
                py2 = mapY(p.y2, yMin, yMax, h);

              ctx.beginPath();
              ctx.setLineDash([5, 5]);
              ctx.strokeStyle = getStyle("--text-muted");
              ctx.lineWidth = 2;
              ctx.moveTo(px1, py1);
              ctx.lineTo(px2, py1);
              ctx.lineTo(px2, py2);
              ctx.stroke();
              ctx.setLineDash([]);
              ctx.beginPath();
              ctx.strokeStyle = getStyle("--math-accent-3");
              ctx.lineWidth = 3;
              ctx.moveTo(px1, py1);
              ctx.lineTo(px2, py2);
              ctx.stroke();

              ctx.fillStyle = getStyle("--math-accent-1");
              ctx.beginPath();
              ctx.arc(px1, py1, 6, 0, Math.PI * 2);
              ctx.fill();
              ctx.fillStyle = getStyle("--math-accent-2");
              ctx.beginPath();
              ctx.arc(px2, py2, 6, 0, Math.PI * 2);
              ctx.fill();

              ctx.fillStyle = getStyle("--text-main");
              ctx.font = "12px Inter";
              ctx.fillText(`(${p.x1}, ${p.y1})`, px1 - 40, py1 - 10);
              ctx.fillText(`(${p.x2}, ${p.y2})`, px2 + 10, py2 - 10);
            }

            // Cl. 9: Quadratics
            else if (topic.id === "g9_quad") {
              eqDiv.innerHTML = `y = <span style="color:var(--math-accent-1)">${p.a}</span>x² + <span style="color:var(--math-accent-2)">${p.b}</span>x + <span style="color:var(--math-accent-3)">${p.c}</span>`;
              let vx = -p.b / (2 * p.a);
              let vy = p.a * vx * vx + p.b * vx + p.c;
              solverDiv.innerHTML = `<strong>Vertex Formula</strong>x = -b / 2a = ${vx.toFixed(2)}<br>y = f(${vx.toFixed(2)}) = ${vy.toFixed(2)}`;

              ctx.beginPath();
              ctx.strokeStyle = getStyle("--math-primary");
              ctx.lineWidth = 3;
              for (let i = 0; i <= w; i += 2) {
                let x = mapX(i, 0, w, xMax - xMin) + xMin;
                let y = p.a * x * x + p.b * x + p.c;
                if (i === 0) ctx.moveTo(i, mapY(y, yMin, yMax, h));
                else ctx.lineTo(i, mapY(y, yMin, yMax, h));
              }
              ctx.stroke();

              if (Math.abs(vy) < 100 * z) {
                let vpx = mapX(vx, xMin, xMax, w),
                  vpy = mapY(vy, yMin, yMax, h);
                ctx.beginPath();
                ctx.arc(vpx, vpy, 6, 0, Math.PI * 2);
                ctx.fillStyle = getStyle("--math-accent-2");
                ctx.fill();
                ctx.fillStyle = getStyle("--text-main");
                ctx.fillText(
                  `V(${vx.toFixed(1)}, ${vy.toFixed(1)})`,
                  vpx + 10,
                  vpy + 15,
                );
                ctx.beginPath();
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = getStyle("--math-accent-2") + "66";
                ctx.moveTo(vpx, 0);
                ctx.lineTo(vpx, h);
                ctx.stroke();
                ctx.setLineDash([]);
              }
            }

            // Cl. 10: Sine Wave
            else if (topic.id === "g10_sine") {
              eqDiv.innerHTML = `y = <span style="color:var(--math-accent-1)">${p.a}</span> · sin(<span style="color:var(--math-accent-2)">${p.b}</span>x)`;
              solverDiv.innerHTML = `<strong>Wave Properties</strong>Amplitude = ${p.a}<br>Period = 2π / ${p.b} ≈ ${((2 * Math.PI) / p.b).toFixed(2)}`;

              ctx.beginPath();
              ctx.strokeStyle = getStyle("--math-accent-1");
              ctx.lineWidth = 3;
              for (let i = 0; i <= w; i += 2) {
                let x = mapX(i, 0, w, xMax - xMin) + xMin;
                let y = p.a * Math.sin(p.b * x);
                if (i === 0) ctx.moveTo(i, mapY(y, yMin, yMax, h));
                else ctx.lineTo(i, mapY(y, yMin, yMax, h));
              }
              ctx.stroke();

              let peakX = Math.PI / 2 / p.b;
              let px = mapX(peakX, xMin, xMax, w);
              ctx.beginPath();
              ctx.setLineDash([4, 4]);
              ctx.strokeStyle = getStyle("--math-accent-2");
              ctx.moveTo(px, mapY(0, yMin, yMax, h));
              ctx.lineTo(px, mapY(p.a, yMin, yMax, h));
              ctx.stroke();
              ctx.setLineDash([]);
              ctx.fillStyle = getStyle("--text-main");
              ctx.fillText(`Amp: ${p.a}`, px + 5, mapY(p.a / 2, yMin, yMax, h));
            }

            // Cl. 11: Derivatives
            else if (topic.id === "g11_deriv") {
              const y_val = p.a * p.x * p.x + p.c;
              const m = 2 * p.a * p.x;
              eqDiv.innerHTML = `f'(x) = 2ax = 2(${p.a})(${p.x}) = <span style="color:var(--math-accent-3)">${m.toFixed(2)}</span>`;
              solverDiv.innerHTML = `<strong>Instantaneous Rate</strong>f(x) = ${p.a}x² ${p.c >= 0 ? "+" : ""} ${p.c}<br>Point: (${p.x.toFixed(1)}, ${y_val.toFixed(1)})`;

              ctx.beginPath();
              ctx.strokeStyle = getStyle("--math-primary");
              ctx.lineWidth = 3;
              for (let i = 0; i <= w; i += 2) {
                let currX = mapX(i, 0, w, xMax - xMin) + xMin;
                let y = p.a * currX * currX + p.c;
                if (i === 0) ctx.moveTo(i, mapY(y, yMin, yMax, h));
                else ctx.lineTo(i, mapY(y, yMin, yMax, h));
              }
              ctx.stroke();

              let y1 = m * (xMin - p.x) + y_val;
              let y2 = m * (xMax - p.x) + y_val;
              ctx.beginPath();
              ctx.strokeStyle = getStyle("--math-accent-3");
              ctx.lineWidth = 2;
              ctx.moveTo(mapX(xMin, xMin, xMax, w), mapY(y1, yMin, yMax, h));
              ctx.lineTo(mapX(xMax, xMin, xMax, w), mapY(y2, yMin, yMax, h));
              ctx.stroke();

              const px = mapX(p.x, xMin, xMax, w),
                py = mapY(y_val, yMin, yMax, h);
              ctx.beginPath();
              ctx.arc(px, py, 6, 0, Math.PI * 2);
              ctx.fillStyle = getStyle("--math-accent-3");
              ctx.fill();
            }

            // Cl. 12: Definite Integrals
            else if (topic.id === "g12_int") {
              let boundA = Math.min(p.x1, p.x2);
              let boundB = Math.max(p.x1, p.x2);
              const integral = (x) => (p.a / 3) * x * x * x + p.c * x;
              const area = integral(boundB) - integral(boundA);

              eqDiv.innerHTML = `∫ f(x)dx = <span style="color:var(--math-accent-4)">${area.toFixed(2)}</span>`;
              solverDiv.innerHTML = `<strong>Integration bounds</strong>[a, b] = [${boundA}, ${boundB}]<br>f(x) = ${p.a}x² + ${p.c}`;

              ctx.beginPath();
              ctx.moveTo(mapX(boundA, xMin, xMax, w), mapY(0, yMin, yMax, h));
              for (let x = boundA; x <= boundB; x += 0.1) {
                ctx.lineTo(
                  mapX(x, xMin, xMax, w),
                  mapY(p.a * x * x + p.c, yMin, yMax, h),
                );
              }
              ctx.lineTo(mapX(boundB, xMin, xMax, w), mapY(0, yMin, yMax, h));
              ctx.fillStyle = getStyle("--math-accent-4") + "66";
              ctx.fill();

              ctx.beginPath();
              ctx.setLineDash([5, 5]);
              ctx.strokeStyle = getStyle("--math-accent-4");
              ctx.lineWidth = 2;
              ctx.moveTo(mapX(boundA, xMin, xMax, w), mapY(0, yMin, yMax, h));
              ctx.lineTo(
                mapX(boundA, xMin, xMax, w),
                mapY(p.a * boundA * boundA + p.c, yMin, yMax, h),
              );
              ctx.moveTo(mapX(boundB, xMin, xMax, w), mapY(0, yMin, yMax, h));
              ctx.lineTo(
                mapX(boundB, xMin, xMax, w),
                mapY(p.a * boundB * boundB + p.c, yMin, yMax, h),
              );
              ctx.stroke();
              ctx.setLineDash([]);

              ctx.beginPath();
              ctx.strokeStyle = getStyle("--math-primary");
              ctx.lineWidth = 3;
              for (let i = 0; i <= w; i += 2) {
                let x = mapX(i, 0, w, xMax - xMin) + xMin;
                let y = p.a * x * x + p.c;
                if (i === 0) ctx.moveTo(i, mapY(y, yMin, yMax, h));
                else ctx.lineTo(i, mapY(y, yMin, yMax, h));
              }
              ctx.stroke();
            }

            // Cl. 12: Vectors
            else if (topic.id === "g12_vec") {
              const sumX = p.x1 + p.x2,
                sumY = p.y1 + p.y2;
              eqDiv.innerHTML = `V₁ + V₂ = <span style="color:var(--math-accent-3)">⟨${sumX}, ${sumY}⟩</span>`;
              solverDiv.innerHTML = `<strong>Vector Addition</strong>V₁ = ⟨${p.x1}, ${p.y1}⟩<br>V₂ = ⟨${p.x2}, ${p.y2}⟩`;

              const ox = mapX(0, xMin, xMax, w),
                oy = mapY(0, yMin, yMax, h);
              const px1 = mapX(p.x1, xMin, xMax, w),
                py1 = mapY(p.y1, yMin, yMax, h);
              const px2 = mapX(p.x2, xMin, xMax, w),
                py2 = mapY(p.y2, yMin, yMax, h);
              const pxSum = mapX(sumX, xMin, xMax, w),
                pySum = mapY(sumY, yMin, yMax, h);

              ctx.beginPath();
              ctx.setLineDash([5, 5]);
              ctx.strokeStyle = getStyle("--text-muted");
              ctx.lineWidth = 2;
              ctx.moveTo(px1, py1);
              ctx.lineTo(pxSum, pySum);
              ctx.moveTo(px2, py2);
              ctx.lineTo(pxSum, pySum);
              ctx.stroke();
              ctx.setLineDash([]);

              drawArrow(
                ctx,
                ox,
                oy,
                pxSum,
                pySum,
                getStyle("--math-accent-3"),
                4,
              );
              drawArrow(ctx, ox, oy, px1, py1, getStyle("--math-accent-1"), 3);
              drawArrow(ctx, ox, oy, px2, py2, getStyle("--math-accent-2"), 3);

              ctx.fillStyle = getStyle("--math-accent-3");
              ctx.font = "bold 14px Inter";
              ctx.fillText(`Sum`, pxSum + 10, pySum - 10);
            }

            // Cl. 12: Matrices
            else if (topic.id === "g12_mat") {
              eqDiv.innerHTML = `Area Scaled by: <span style="color:var(--math-accent-3)">${Math.abs(p.sx * p.sy - 0 * p.shx).toFixed(2)}x</span>`;
              solverDiv.innerHTML = `<strong>Transformation Matrix</strong>[ ${p.sx.toFixed(1)}   ${p.shx.toFixed(1)} ]<br>[  0.0   ${p.sy.toFixed(1)} ]`;

              const ox = mapX(0, xMin, xMax, w),
                oy = mapY(0, yMin, yMax, h);
              const unit = w / (xMax - xMin);

              ctx.beginPath();
              ctx.strokeStyle = getStyle("--border-color");
              ctx.lineWidth = 1;
              for (let i = 0; i <= 4; i++) {
                ctx.moveTo(ox, oy - i * unit);
                ctx.lineTo(ox + 4 * unit, oy - i * unit);
                ctx.moveTo(ox + i * unit, oy);
                ctx.lineTo(ox + i * unit, oy - 4 * unit);
              }
              ctx.stroke();

              ctx.beginPath();
              ctx.strokeStyle = getStyle("--math-accent-1");
              ctx.lineWidth = 2;
              for (let i = 0; i <= 4; i++) {
                ctx.moveTo(
                  ox + (0 * p.sx + i * p.shx) * unit,
                  oy - i * p.sy * unit,
                );
                ctx.lineTo(
                  ox + (4 * p.sx + i * p.shx) * unit,
                  oy - i * p.sy * unit,
                );
                ctx.moveTo(
                  ox + (i * p.sx + 0 * p.shx) * unit,
                  oy - 0 * p.sy * unit,
                );
                ctx.lineTo(
                  ox + (i * p.sx + 4 * p.shx) * unit,
                  oy - 4 * p.sy * unit,
                );
              }
              ctx.stroke();

              ctx.beginPath();
              ctx.fillStyle = getStyle("--math-accent-1") + "4D";
              ctx.moveTo(ox, oy);
              ctx.lineTo(ox + p.sx * unit, oy);
              ctx.lineTo(ox + (p.sx + p.shx) * unit, oy - p.sy * unit);
              ctx.lineTo(ox + p.shx * unit, oy - p.sy * unit);
              ctx.closePath();
              ctx.fill();
            } else {
              if (p.m !== undefined && p.b !== undefined) {
                ctx.beginPath();
                ctx.strokeStyle = getStyle("--math-primary");
                ctx.lineWidth = 3;
                ctx.moveTo(0, mapY(p.m * xMin + p.b, yMin, yMax, h));
                ctx.lineTo(w, mapY(p.m * xMax + p.b, yMin, yMax, h));
                ctx.stroke();
              }
            }
          }

          // Check Active Challenge
          if (AppState.practiceMode && AppState.currentChallenge) {
            const box = document.getElementById("challengeBox");
            const status = document.getElementById("challengeStatus");

            if (AppState.currentChallenge.check(p)) {
              if (!AppState.challengeSolvedFlag) {
                AppState.challengeSolvedFlag = true;
                TelemetryEngine.track("challenge_solved", {
                  topic: AppState.topicId,
                  challenge: AppState.currentChallenge.text,
                });
              }
              box.classList.add("success");
              status.innerText = "✓ Solved!";
            } else {
              AppState.challengeSolvedFlag = false;
              box.classList.remove("success");
              status.innerText = "[ Pending ]";
            }
          }
        }

        // --- EVENTS & BOOTSTRAP ---
        document
          .getElementById("globalSearch")
          .addEventListener("input", (e) => {
            AppState.search = e.target.value;
            syncURL();
            renderNavigation();
          });
        document
          .getElementById("gradeFilter")
          .addEventListener("change", (e) => {
            AppState.filter = e.target.value;
            syncURL();
            renderNavigation();
          });

        document
          .getElementById("practiceModeBtn")
          .addEventListener("click", (e) => {
            AppState.practiceMode = !AppState.practiceMode;
            TelemetryEngine.track("ui_interaction", {
              action: "practice_mode_toggled",
              active: AppState.practiceMode,
            });

            e.currentTarget.classList.toggle(
              "toggle-on",
              AppState.practiceMode,
            );
            document
              .getElementById("challengeBox")
              .classList.toggle("active", AppState.practiceMode);
            if (AppState.practiceMode)
              AppState.currentChallenge = generateChallenge();
            buildTopicUI();
          });

        document
          .getElementById("nextChallengeBtn")
          .addEventListener("click", () => {
            AppState.currentChallenge = generateChallenge();
            TelemetryEngine.track("challenge_requested", {
              topic: AppState.topicId,
              challenge: AppState.currentChallenge.text,
            });
            document.getElementById("challengeText").innerHTML =
              `<strong>Challenge:</strong> ${AppState.currentChallenge.text}`;
            document.getElementById("challengeBox").classList.remove("success");
            document.getElementById("challengeStatus").innerText =
              "[ Pending ]";
            drawCanvas();
          });

        // Zoom Control Events
        document.getElementById("zoomInBtn").addEventListener("click", () => {
          AppState.zoom = Math.max(0.2, AppState.zoom - 0.2);
          TelemetryEngine.track("ui_interaction", {
            action: "canvas_zoomed",
            level: AppState.zoom,
          });
          drawCanvas();
        });
        document.getElementById("zoomOutBtn").addEventListener("click", () => {
          AppState.zoom = Math.min(5.0, AppState.zoom + 0.2);
          TelemetryEngine.track("ui_interaction", {
            action: "canvas_zoomed",
            level: AppState.zoom,
          });
          drawCanvas();
        });

        // Trackpad / Scroll Wheel Zoom
        canvas.addEventListener(
          "wheel",
          (e) => {
            e.preventDefault();
            if (e.deltaY > 0) {
              AppState.zoom = Math.min(5.0, AppState.zoom + 0.1);
            } else {
              AppState.zoom = Math.max(0.2, AppState.zoom - 0.1);
            }
            drawCanvas();
          },
          { passive: false },
        );

        // Touch and Mouse Interactions for Vector Canvas
        function handleCanvasInteraction(e) {
          if (AppState.topicId !== "g12_vec") return;

          let clientX = e.clientX || (e.touches && e.touches[0].clientX);
          let clientY = e.clientY || (e.touches && e.touches[0].clientY);
          if (!clientX) return;

          const r = canvas.getBoundingClientRect();
          const z = AppState.zoom;
          const isMobile = window.innerWidth <= 768;
          const hRatio = isMobile ? 1.5 : 2;

          // Match dynamic aspect ratio logic used in drawCanvas
          const mathX = invMapX(
            (clientX - r.left) * (canvas.width / dpr / r.width),
            -10 * z,
            10 * z,
            canvas.width / dpr,
          );
          const mathY = invMapY(
            (clientY - r.top) * (canvas.height / dpr / r.height),
            -10 * z * (1 / hRatio),
            10 * z * (1 / hRatio),
            canvas.height / dpr,
          );

          AppState.params.x2 = Math.round(mathX);
          AppState.params.y2 = Math.round(mathY);

          const sX = document.getElementById("slider_x2"),
            iX = document.getElementById("val_x2");
          if (sX) {
            sX.value = AppState.params.x2;
            iX.value = AppState.params.x2.toFixed(1);
          }
          const sY = document.getElementById("slider_y2"),
            iY = document.getElementById("val_y2");
          if (sY) {
            sY.value = AppState.params.y2;
            iY.value = AppState.params.y2.toFixed(1);
          }

          TelemetryEngine.trackParamChange(
            AppState.topicId,
            "v2_dragged",
            `${AppState.params.x2},${AppState.params.y2}`,
          );

          syncURL();
          drawCanvas();
        }

        canvas.addEventListener("mousedown", handleCanvasInteraction);
        canvas.addEventListener("touchstart", handleCanvasInteraction, {
          passive: true,
        });
        canvas.addEventListener(
          "touchmove",
          (e) => {
            if (AppState.topicId === "g12_vec") {
              e.preventDefault(); // Prevent scrolling while dragging vectors on mobile
              handleCanvasInteraction(e);
            }
          },
          { passive: false },
        );

        document
          .getElementById("themeToggleBtn")
          .addEventListener("click", (e) => {
            const root = document.documentElement;
            const isLight = root.getAttribute("data-theme") === "light";
            root.setAttribute("data-theme", isLight ? "dark" : "light");
            e.currentTarget.innerHTML = isLight ? "☀️ Theme" : "🌙 Theme";
            TelemetryEngine.track("ui_interaction", {
              action: "theme_toggled",
              theme: isLight ? "dark" : "light",
            });
            drawCanvas();
          });

        document
          .getElementById("presentModeBtn")
          .addEventListener("click", () => {
            document.body.classList.toggle("presentation-mode");
            TelemetryEngine.track("ui_interaction", {
              action: "presentation_mode_toggled",
            });
            setTimeout(() => drawCanvas(), 300);
          });

        document
          .getElementById("shareLinkBtn")
          .addEventListener("click", () => {
            syncURL();
            const el = document.createElement("textarea");
            el.value = window.location.href;
            document.body.appendChild(el);
            el.select();
            document.execCommand("copy");
            document.body.removeChild(el);
            const t = document.getElementById("toast");
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 2000);
            TelemetryEngine.track("ui_interaction", { action: "link_shared" });
          });

        // Boot Sequence
        loadFromURL();
        buildTopicUI();
        window.addEventListener("resize", drawCanvas);
      })();
    </script>
  </body>
</html>
