        const SFX = {
          ctx: null,
          init() {
            if (!this.ctx)
              this.ctx = new (
                window.AudioContext || window.webkitAudioContext
              )();
          },
          playPop() {
            try {
              this.init();
              const o = this.ctx.createOscillator(),
                g = this.ctx.createGain();
              o.type = "sine";
              o.frequency.setValueAtTime(400, this.ctx.currentTime);
              o.frequency.exponentialRampToValueAtTime(
                600,
                this.ctx.currentTime + 0.05,
              );
              g.gain.setValueAtTime(0.1, this.ctx.currentTime);
              g.gain.exponentialRampToValueAtTime(
                0.01,
                this.ctx.currentTime + 0.05,
              );
              o.connect(g);
              g.connect(this.ctx.destination);
              o.start();
              o.stop(this.ctx.currentTime + 0.05);
            } catch (e) {}
          },
          playSuccess() {
            try {
              this.init();
              [440, 554, 659, 880].forEach((freq, i) => {
                const o = this.ctx.createOscillator(),
                  g = this.ctx.createGain();
                o.type = "triangle";
                o.frequency.value = freq;
                g.gain.setValueAtTime(0, this.ctx.currentTime + i * 0.05);
                g.gain.linearRampToValueAtTime(
                  0.1,
                  this.ctx.currentTime + i * 0.05 + 0.02,
                );
                g.gain.exponentialRampToValueAtTime(
                  0.01,
                  this.ctx.currentTime + i * 0.05 + 0.5,
                );
                o.connect(g);
                g.connect(this.ctx.destination);
                o.start(this.ctx.currentTime + i * 0.05);
                o.stop(this.ctx.currentTime + i * 0.05 + 0.5);
              });
            } catch (e) {}
          },
          playError() {
            try {
              this.init();
              const o = this.ctx.createOscillator(),
                g = this.ctx.createGain();
              o.type = "sawtooth";
              o.frequency.setValueAtTime(200, this.ctx.currentTime);
              o.frequency.linearRampToValueAtTime(
                100,
                this.ctx.currentTime + 0.3,
              );
              g.gain.setValueAtTime(0.1, this.ctx.currentTime);
              g.gain.exponentialRampToValueAtTime(
                0.01,
                this.ctx.currentTime + 0.3,
              );
              o.connect(g);
              g.connect(this.ctx.destination);
              o.start();
              o.stop(this.ctx.currentTime + 0.3);
            } catch (e) {}

        function loadData() {
          try {
            const saved = localStorage.getItem("mathStudioV4");
            if (saved) {
              const data = JSON.parse(saved);
              if (data.lastActiveDate !== getTodayStr()) {
                data.progressToday = 0;
                data.lastActiveDate = getTodayStr();
              }
              if (!data.achievements) data.achievements = [];
              const merged = { ...defaultState, ...data };
              merged.view = merged.isLoggedIn ? "home" : "login";
              return merged;
            }
          } catch (e) {}
          return defaultState;
        }

        function calculateStreak() {
          let count = 0;
          let d = new Date();
          const todayStr = d.toISOString().split("T")[0];
          d.setDate(d.getDate() - 1);
          const yesterdayStr = d.toISOString().split("T")[0];
          if (
            !AppState.streakDays.includes(todayStr) &&
            !AppState.streakDays.includes(yesterdayStr)
          ) {
            AppState.user.streak = 0;
            return;
          }
          let currentStr = AppState.streakDays.includes(todayStr)
            ? todayStr
            : yesterdayStr;
          let curr = new Date(currentStr);
          while (
            AppState.streakDays.includes(curr.toISOString().split("T")[0])
          ) {
            count++;
            curr.setDate(curr.getDate() - 1);
          }
          AppState.user.streak = count;
        }

        // ============================================================================
        // SVG GRAPHING ENGINE
        // ============================================================================
        let isDragging = false,
          dragStartX = 0,
          dragStartY = 0;
        function resetViewport() {
          AppState.vp = { x: 0, y: 0, z: 1 };
          applyViewportTransform();
        }
        function applyViewportTransform() {
          const group = document.getElementById("zoom-pan-group");
          if (group)
            group.setAttribute(
              "transform",
              `translate(${AppState.vp.x}, ${AppState.vp.y}) scale(${AppState.vp.z})`,
            );
        }
        function initViewportEvents(container) {
          if (AppState.topicPhase === "predict") return;
          container.onwheel = (e) => {
            e.preventDefault();
            AppState.vp.z = Math.max(
              0.3,
              Math.min(3, AppState.vp.z + (e.deltaY > 0 ? -0.1 : 0.1)),
            );
            applyViewportTransform();
          };
          container.onmousedown = (e) => {
            isDragging = true;
            dragStartX = e.clientX - AppState.vp.x;
            dragStartY = e.clientY - AppState.vp.y;
          };
          container.onmousemove = (e) => {
            if (!isDragging) return;
            AppState.vp.x = e.clientX - dragStartX;
            AppState.vp.y = e.clientY - dragStartY;
            applyViewportTransform();
          };
          container.onmouseup = () => (isDragging = false);
          container.onmouseleave = () => (isDragging = false);
          container.addEventListener(
            "touchstart",
            (e) => {
              if (e.touches.length === 1) {
                isDragging = true;
                dragStartX = e.touches[0].clientX - AppState.vp.x;
                dragStartY = e.touches[0].clientY - AppState.vp.y;
              }
            },
            { passive: false },
          );
          container.addEventListener(
            "touchmove",
            (e) => {
              if (isDragging && e.touches.length === 1) {
                e.preventDefault();
                AppState.vp.x = e.touches[0].clientX - dragStartX;
                AppState.vp.y = e.touches[0].clientY - dragStartY;
                applyViewportTransform();
              }
            },
            { passive: false },
          );
          container.addEventListener("touchend", () => (isDragging = false));
          container.addEventListener("touchcancel", () => (isDragging = false));
        }

        function buildCoordinateSVG(
          innerContent,
          customViewBox = "-10 -10 20 20",
          showGrid = true,
        ) {
          const isDark = document.documentElement.classList.contains("dark");
          const gridColor = isDark
            ? "rgba(255,255,255,0.15)"
            : "rgba(0,0,0,0.1)";
          const axisColor = isDark
            ? "rgba(255,255,255,0.4)"
            : "rgba(0,0,0,0.3)";
          const textColor = isDark ? "#94a3b8" : "#334155";
          const strokeW = isDark ? "0.08" : "0.05";
          let gridHtml = "";
          if (showGrid) {
            gridHtml = `
            <defs><pattern id="gridPattern" width="1" height="1" patternUnits="userSpaceOnUse"><path d="M 1 0 L 0 0 0 1" fill="none" stroke="${gridColor}" stroke-width="${strokeW}" vector-effect="non-scaling-stroke"/></pattern></defs>
            <rect x="-100" y="-100" width="200" height="200" fill="url(#gridPattern)" />
            <line x1="-100" y1="0" x2="100" y2="0" stroke="${axisColor}" stroke-width="0.2" vector-effect="non-scaling-stroke"/>
            <line x1="0" y1="-100" x2="0" y2="100" stroke="${axisColor}" stroke-width="0.2" vector-effect="non-scaling-stroke"/>
          `;
            for (let i = -10; i <= 10; i += 2) {
              if (i !== 0)
                gridHtml += `<text x="${i}" y="-0.3" font-size="0.6" font-weight="bold" fill="${textColor}" text-anchor="middle" transform="scale(1, -1)">${i}</text><text x="0.3" y="${-i}" font-size="0.6" font-weight="bold" fill="${textColor}" dominant-baseline="middle" transform="scale(1, -1)">${i}</text>`;
            }
          }
          return `
          <svg viewBox="${customViewBox}" class="w-full h-full absolute inset-0 ${AppState.topicPhase === "predict" ? "" : "viewport-container"} rounded-2xl sm:rounded-3xl overflow-hidden transition-all duration-500 ${AppState.topicPhase === "predict" ? "opacity-70 grayscale-[20%] pointer-events-none scale-95" : ""}">
            <g id="zoom-pan-group" transform="translate(${AppState.vp.x}, ${AppState.vp.y}) scale(${AppState.vp.z})">
              <g transform="scale(1, -1)">${gridHtml}${innerContent}</g>
            </g>
          </svg>
          ${AppState.topicPhase !== "predict" ? `<button onclick="window.resetViewport()" class="absolute bottom-2 right-2 sm:bottom-4 sm:right-4 bg-white/90 dark:bg-slate-800/90 backdrop-blur border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 px-3 py-1.5 sm:px-4 sm:py-2 rounded-xl text-xs sm:text-sm font-bold shadow-md hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors z-20 flex items-center gap-1 sm:gap-2"><i data-lucide="focus" class="w-3 h-3 sm:w-4 sm:h-4"></i> Reset</button>` : ""}
        `;
        }

        function renderVisualizer(id, p) {
          const isDark = document.documentElement.classList.contains("dark");
          const sw = isDark ? "0.25" : "0.15";
          if (id === "g1_add")
            return buildCoordinateSVG(
              `<line x1="-10" y1="0" x2="10" y2="0" stroke="${isDark ? "#cbd5e1" : "#000"}" stroke-width="0.1" vector-effect="non-scaling-stroke" /><path d="M ${p.a} 0 Q ${(p.a * 2 + p.b) / 2} 3 ${p.a + p.b} 0" fill="none" stroke="#f97316" stroke-width="0.15" vector-effect="non-scaling-stroke" marker-end="url(#arrow-nl)" /><circle cx="${p.a}" cy="0" r="0.3" fill="#ea580c"/><circle cx="${p.a + p.b}" cy="0" r="0.3" fill="#ea580c"/><defs><marker id="arrow-nl" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316" /></marker></defs>`,
              "-2 -5 14 10",
              false,
            );
          if (id === "g3_frac") {
            let s = "";
            for (let i = 0; i < p.d; i++) {
              let a1 = (i / p.d) * Math.PI * 2,
                a2 = ((i + 1) / p.d) * Math.PI * 2;
              s += `<path d="M 0 0 L ${5 * Math.cos(a1)} ${5 * Math.sin(a1)} A 5 5 0 0 1 ${5 * Math.cos(a2)} ${5 * Math.sin(a2)} Z" fill="${i < p.n ? "rgba(244,63,94,0.8)" : "rgba(226,232,240,0.3)"}" stroke="${isDark ? "#1e293b" : "#fff"}" stroke-width="0.1" vector-effect="non-scaling-stroke"/>`;
            }
            return buildCoordinateSVG(s, "-6 -6 12 12", false);
          }
          if (id === "g4_area")
            return buildCoordinateSVG(
              `<rect x="0" y="0" width="${p.w}" height="${p.h}" fill="rgba(16, 185, 129, 0.2)" stroke="#10b981" stroke-width="0.1" vector-effect="non-scaling-stroke" /><text x="${p.w / 2}" y="${-p.h / 2}" font-size="1" fill="${isDark ? "#34d399" : "#064e3b"}" text-anchor="middle" dominant-baseline="middle" transform="scale(1, -1)">Area = ${p.w * p.h}</text>`,
              "-2 -2 12 12",
            );
          if (id === "g8_lin")
            return buildCoordinateSVG(
              `<line x1="-10" y1="${p.m * -10 + p.b}" x2="10" y2="${p.m * 10 + p.b}" stroke="#a855f7" stroke-width="${sw}" vector-effect="non-scaling-stroke"/><circle cx="0" cy="${p.b}" r="0.4" fill="#f43f5e" />`,
            );
          if (id === "g8_sys")
            return buildCoordinateSVG(
              `<line x1="-10" y1="${p.m1 * -10 + p.b1}" x2="10" y2="${p.m1 * 10 + p.b1}" stroke="#6366f1" stroke-width="${sw}" vector-effect="non-scaling-stroke"/><line x1="-10" y1="${p.m2 * -10 + p.b2}" x2="10" y2="${p.m2 * 10 + p.b2}" stroke="#06b6d4" stroke-width="${sw}" vector-effect="non-scaling-stroke"/>${p.m1 !== p.m2 ? `<circle cx="${(p.b2 - p.b1) / (p.m1 - p.m2)}" cy="${p.m1 * ((p.b2 - p.b1) / (p.m1 - p.m2)) + p.b1}" r="0.4" fill="#10b981"/>` : ""}`,
            );
          if (id === "g8_scat") {
            let pts = "";
            for (let i = -8; i <= 8; i += 1.5)
              pts += `<circle cx="${i}" cy="${i * p.r + Math.sin(i * 123) * 3 * (1 - Math.abs(p.r))}" r="0.35" fill="#0ea5e9" />`;
            return buildCoordinateSVG(
              pts +
                `<line x1="-10" y1="${-10 * p.r}" x2="10" y2="${10 * p.r}" stroke="#f43f5e" stroke-width="${isDark ? "0.1" : "0.05"}" stroke-dasharray="0.3" vector-effect="non-scaling-stroke"/>`,
            );
          }
          if (id === "g8_pyth")
            return buildCoordinateSVG(
              `<polygon points="0,0 ${p.a},0 ${p.a},${-p.a} 0,${-p.a}" fill="rgba(135,206,235,0.8)" stroke="#0088cc" stroke-width="0.05" vector-effect="non-scaling-stroke" /><text x="${p.a / 2}" y="${p.a / 2}" font-size="0.6" font-weight="bold" fill="#000" text-anchor="middle" dominant-baseline="middle" transform="scale(1, -1)">a²=${p.a * p.a}</text><polygon points="0,0 0,${p.b} ${-p.b},${p.b} ${-p.b},0" fill="rgba(255,182,193,0.8)" stroke="#cc0033" stroke-width="0.05" vector-effect="non-scaling-stroke" /><text x="${-p.b / 2}" y="${-p.b / 2}" font-size="0.6" font-weight="bold" fill="#000" text-anchor="middle" dominant-baseline="middle" transform="scale(1, -1)">b²=${p.b * p.b}</text><polygon points="${p.a},0 0,${p.b} ${p.b},${p.b + p.a} ${p.a + p.b},${p.a}" fill="rgba(200,162,200,0.8)" stroke="#8a2be2" stroke-width="0.05" vector-effect="non-scaling-stroke" /><g transform="translate(${(p.a + p.b) / 2}, ${(p.b + p.a) / 2}) rotate(${-Math.atan2(p.b, p.a) * (180 / Math.PI)})"><text x="0" y="0" font-size="0.6" font-weight="bold" fill="#000" text-anchor="middle" dominant-baseline="middle" transform="scale(1, -1)">c²=${p.a * p.a + p.b * p.b}</text></g><polygon points="0,0 ${p.a},0 0,${p.b}" fill="rgba(180,180,180,0.8)" stroke="#666" stroke-width="0.05" vector-effect="non-scaling-stroke" />`,
              "-10 -10 20 20",
            );
          if (id === "g9_quad") {
            let path = `M -10 ${p.a * 100 - p.b * 10 + p.c} `;
            for (let x = -10; x <= 10; x += 0.5)
              path += `L ${x} ${p.a * x * x + p.b * x + p.c} `;
            return buildCoordinateSVG(
              `<path d="${path}" fill="none" stroke="#ef4444" stroke-width="${sw}" vector-effect="non-scaling-stroke" />`,
            );
          }
          if (id === "g9_dist")
            return buildCoordinateSVG(
              `<line x1="0" y1="0" x2="${p.x2}" y2="${p.y2}" stroke="#14b8a6" stroke-width="${sw}" vector-effect="non-scaling-stroke"/><line x1="0" y1="0" x2="${p.x2}" y2="0" stroke="#94a3b8" stroke-dasharray="0.2" stroke-width="0.05" vector-effect="non-scaling-stroke"/><line x1="${p.x2}" y1="0" x2="${p.x2}" y2="${p.y2}" stroke="#94a3b8" stroke-dasharray="0.2" stroke-width="0.05" vector-effect="non-scaling-stroke"/><circle cx="0" cy="0" r="0.3" fill="#0f766e"/><circle cx="${p.x2}" cy="${p.y2}" r="0.3" fill="#14b8a6"/>`,
            );
          if (id === "g10_sine") {
            let path = `M -10 ${p.a * Math.sin(-10 * p.f)} `;
            for (let x = -10; x <= 10; x += 0.2)
              path += `L ${x} ${p.a * Math.sin(x * p.f)} `;
            return buildCoordinateSVG(
              `<path d="${path}" fill="none" stroke="#06b6d4" stroke-width="${sw}" vector-effect="non-scaling-stroke" />`,
            );
          }
          if (id === "g11_deriv") {
            const a = 0.5,
              c = -2;
            let path = `M -10 ${a * 100 + c} `;
            for (let x = -10; x <= 10; x += 0.5)
              path += `L ${x} ${a * x * x + c} `;
            const y = a * p.x * p.x + c,
              m = 2 * a * p.x;
            return buildCoordinateSVG(
              `<path d="${path}" fill="none" stroke="${isDark ? "#94a3b8" : "#64748b"}" stroke-width="0.15" vector-effect="non-scaling-stroke" /><path d="M -10 ${m * (-10 - p.x) + y} L 10 ${m * (10 - p.x) + y}" fill="none" stroke="#d946ef" stroke-width="${sw}" vector-effect="non-scaling-stroke" /><circle cx="${p.x}" cy="${y}" r="0.45" fill="#d946ef" />`,
            );
          }
          if (id === "g12_int") {
            const a = -0.2,
              c = 4;
            let path = `M -10 ${a * 100 + c} `;
            for (let x = -10; x <= 10; x += 0.5)
              path += `L ${x} ${a * x * x + c} `;
            let fill = `M ${p.x1} 0 `;
            for (let x = p.x1; x <= p.x2; x += 0.2)
              fill += `L ${x} ${a * x * x + c} `;
            fill += `L ${p.x2} 0 Z`;
            return buildCoordinateSVG(
              `<path d="${fill}" fill="rgba(139,92,246,0.4)" /><path d="${path}" fill="none" stroke="#8b5cf6" stroke-width="${sw}" vector-effect="non-scaling-stroke" /><line x1="${p.x1}" y1="0" x2="${p.x1}" y2="${a * p.x1 * p.x1 + c}" stroke="#6d28d9" stroke-width="0.1" stroke-dasharray="0.2" vector-effect="non-scaling-stroke"/><line x1="${p.x2}" y1="0" x2="${p.x2}" y2="${a * p.x2 * p.x2 + c}" stroke="#6d28d9" stroke-width="0.1" stroke-dasharray="0.2" vector-effect="non-scaling-stroke"/>`,
            );
          }
          if (id === "g12_vec")
            return buildCoordinateSVG(
              `<line x1="0" y1="0" x2="${p.vx}" y2="${p.vy}" stroke="#84cc16" stroke-width="${sw}" vector-effect="non-scaling-stroke" marker-end="url(#arrow)"/><circle cx="${p.vx}" cy="${p.vy}" r="0.3" fill="#4d7c0f"/><defs><marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#84cc16" /></marker></defs>`,
            );
          if (id === "g12_mat")
            return buildCoordinateSVG(
              `<polygon points="0,0 ${2 * p.sx},${2 * p.sh} ${2 * p.sx + 2},${2 * p.sh + 2} 2,2" fill="rgba(100,116,139,0.4)" stroke="#64748b" stroke-width="0.1" vector-effect="non-scaling-stroke"/>`,
              "-5 -5 10 10",
            );
          return buildCoordinateSVG(
            `<text x="0" y="0" font-size="1" fill="#64748b" text-anchor="middle" transform="scale(1, -1)">Visual Engine Active</text>`,
          );
        }

        function setView(view, payload = null, isBack = false) {
          SFX.playPop();

            AppState.history.push(AppState.view);

          if (view === "home") AppState.history = []; // reset stack on home

          AppState.view = view;
          if (payload?.pathId) AppState.activePathId = payload.pathId;
          if (payload?.topicId) {
            AppState.activeTopicId = payload.topicId;
            AppState.params = {
              ...MathRegistry[payload.topicId].initialParams,
            };
            AppState.topicPhase = "predict";
            AppState.predictState = "idle";
            AppState.challengeIndex = 0;
            AppState.challengeState = "idle";
            window.resetViewport();

          updateSEO();
          renderApp();
          window.scrollTo(0, 0);

          const prev = AppState.history.pop() || "home";
          setView(prev, null, true);

        function handlePredictAnswer(index) {
          if (AppState.predictState === "correct") return;
          const topic = MathRegistry[AppState.activeTopicId];
          if (index === topic.predict.correct) {
            AppState.predictState = "correct";
            SFX.playSuccess();
            if (navigator.vibrate) navigator.vibrate(50);
          } else {
            AppState.predictState = "wrong";
            AppState.mcqWrongIndex = index;
            SFX.playError();
            if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
          }
          renderRightPanel();

          SFX.playPop();

          startHintTimer();

        function handleParamChange(controlId, value) {
          if (AppState.topicPhase === "predict") return;
          const numVal = parseFloat(value);
          if (!isNaN(numVal)) {
            AppState.params[controlId] = numVal;
            updateVisualizer();
            evaluateChallenge();
          }
        }
        function startHintTimer() {
          clearTimeout(AppState.hintTimer);
          AppState.hintTimer = setTimeout(() => {
            if (
              AppState.challengeState === "idle" &&
              AppState.topicPhase === "interact"
            ) {
              AppState.challengeState = "hint";
              renderRightPanel();
            }
          }, 12000);
        }
        function evaluateChallenge() {
          if (AppState.challengeState === "solved") return;
          const topic = MathRegistry[AppState.activeTopicId];
          if (
            topic.challenges[AppState.challengeIndex].check(AppState.params)
          ) {
            AppState.challengeState = "solved";
            AppState.user.xp += 50;
            SFX.playSuccess();
            if (navigator.vibrate) navigator.vibrate([50, 50, 100]);
            incrementDailyProgress();
            renderRightPanel();
            checkAchievements();

          SFX.playPop();

          if (AppState.challengeIndex < topic.challenges.length - 1) {
            AppState.challengeIndex++;

            renderRightPanel();
            startHintTimer();

              <div class="flex justify-between"><label class="font-bold ${c.color} text-xs sm:text-sm">${c.label}</label><input type="number" value="${AppState.params[c.id]}" min="${c.min}" max="${c.max}" step="${c.step}" oninput="window.handleParamChange('${c.id}', this.value)" ${isSolved ? "disabled" : ""} class="w-14 text-center font-mono bg-white dark:bg-slate-900 border rounded-lg p-1 font-bold disabled:opacity-50" /></div>

            </div>`,
              )
              .join("");
            container.innerHTML = `
            <div class="fade-enter fade-enter-active flex flex-col h-full">
              <div class="inline-flex items-center gap-2 bg-purple-100 dark:bg-purple-900/30 text-purple-600 px-3 py-1 rounded-full text-xs font-bold mb-4"><i data-lucide="mouse-pointer-click" class="w-4 h-4"></i> Step 2: Interact & Solve</div>
              <div class="glass-panel p-4 sm:p-6 rounded-3xl mb-6 ${isSolved ? "ring-2 ring-emerald-400 bg-emerald-50/80" : "dark:bg-slate-800/80"}">
                <div class="flex items-center gap-2 mb-3"><div class="w-6 h-6 rounded-full ${isSolved ? "bg-emerald-100 text-emerald-600" : "bg-blue-100 text-blue-600"} flex items-center justify-center"><i data-lucide="${isSolved ? "check" : "target"}" class="w-3 h-3"></i></div><span class="text-[10px] font-extrabold uppercase ${isSolved ? "text-emerald-600" : "text-slate-500"}">Mission ${AppState.challengeIndex + 1}/${topic.challenges.length}</span></div>
                <p class="font-semibold text-base mb-2">${challenge.text}</p>
                ${showHint ? `<div class="mt-4 p-3 bg-amber-50/80 dark:bg-amber-900/20 rounded-2xl text-amber-800 text-xs flex gap-3"><i data-lucide="lightbulb" class="shrink-0 w-4 h-4"></i><p>${challenge.hint}</p></div>` : ""}
                ${isSolved ? `<button onclick="window.nextChallenge()" class="mt-5 w-full bg-emerald-500 text-white font-bold py-3 rounded-xl flex justify-center gap-2">${AppState.challengeIndex === topic.challenges.length - 1 ? "Reveal Insight" : "Next Mission"} <i data-lucide="arrow-right" class="w-4 h-4"></i></button>` : ""}
              </div>
              <div>${sliders}</div>
            </div>`;
          } else if (AppState.topicPhase === "mastered") {
            const nextTopicId = getNextTopicId(AppState.activeTopicId);
            const nextTopicData = nextTopicId
              ? MathRegistry[nextTopicId]
              : null;

            let autoNextHtml = "";
            if (nextTopicData) {
              autoNextHtml = `
                <div class="mt-6 p-4 rounded-2xl bg-white/60 dark:bg-slate-800/60 border border-slate-200 dark:border-slate-700 flex items-center justify-between group shadow-sm transition-all">
                    <div class="flex items-center gap-4">
                        <div class="relative w-12 h-12 flex items-center justify-center shrink-0">
                            <svg class="absolute inset-0 w-full h-full -rotate-90" viewBox="0 0 36 36">
                                <circle cx="18" cy="18" r="16" fill="none" stroke="currentColor" stroke-width="3" class="text-slate-200 dark:text-slate-700"></circle>
                                <circle cx="18" cy="18" r="16" fill="none" stroke="currentColor" stroke-width="3" class="text-blue-500" style="stroke-dasharray: 100.53; animation: autoNextRing 7s linear forwards;"></circle>
                            </svg>
                            <i data-lucide="play" class="w-4 h-4 text-blue-500 ml-0.5"></i>
                        </div>
                        <div>
                            <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-0.5">Up Next</div>
                            <div class="font-bold text-sm sm:text-base text-slate-800 dark:text-slate-200">${nextTopicData.title}</div>
                        </div>
                    </div>
                    <button onclick="window.clearAutoNextTimer(); this.parentElement.innerHTML = '<div class=\\'flex items-center gap-3 w-full justify-center\\'><i data-lucide=\\'pause-circle\\' class=\\'w-5 h-5 opacity-50\\'></i><span class=\\'text-sm font-bold opacity-50\\'>Auto-play paused</span></div>'; lucide.createIcons();" class="p-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors bg-slate-100 dark:bg-slate-700/50 rounded-lg" title="Pause Auto-play">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                `;
            }

            container.innerHTML = `
            <div class="fade-enter fade-enter-active flex flex-col h-full justify-center">
              <div class="inline-flex items-center gap-2 bg-yellow-100 dark:bg-yellow-900/30 text-yellow-600 px-3 py-1 rounded-full text-xs font-bold mb-4"><i data-lucide="lightbulb" class="w-4 h-4"></i> Step 3: The Key Insight</div>
              <div class="glass-panel p-6 sm:p-8 rounded-3xl border-t-4 border-yellow-400 shadow-xl mb-6"><h3 class="text-2xl font-extrabold mb-4">The "Aha!" Moment</h3><p class="font-medium text-lg">${topic.insight}</p></div>
              <button onclick="window.completeAndGoNext('${nextTopicId || ""}')" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white font-extrabold py-4 rounded-2xl shadow-lg flex justify-center gap-2 hover:scale-[1.02] transition-transform">
                ${nextTopicId ? "Continue to Next Topic" : "Complete Track"} <i data-lucide="${nextTopicId ? "arrow-right" : "check-circle"}" class="w-6 h-6"></i>
              </button>
              ${autoNextHtml}
            </div>`;
          }
          lucide.createIcons({ root: container });
        }

        function renderApp() {
          const main = document.getElementById("app-main");
          if (!AppState.isLoggedIn) {
            document.getElementById("app-header").innerHTML = "";
            main.innerHTML = `
            <div class="flex flex-col items-center justify-center min-h-[80vh] w-full fade-enter fade-enter-active">
              <div class="glass-panel w-full max-w-md p-8 sm:p-12 rounded-[2rem] text-center shadow-2xl dark:bg-slate-900 border border-white/20">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600 text-white mb-6 shadow-lg"><i data-lucide="hexagon" class="w-8 h-8"></i></div>
                <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white mb-2">Math Studio</h1>
                <p class="text-slate-500 dark:text-slate-400 font-medium mb-8">Understand math visually.</p>
                <form onsubmit="window.doLogin(event)" class="flex flex-col gap-4">
                  <input type="text" id="login-name" placeholder="Enter your username" class="w-full bg-slate-100 dark:bg-slate-800 border-0 rounded-2xl px-5 py-4 outline-none focus:ring-4 focus:ring-blue-500/20 font-bold text-slate-800 dark:text-white transition-all text-lg text-center" required>
                  <button type="submit" class="w-full bg-slate-900 dark:bg-blue-600 text-white font-bold py-4 rounded-2xl hover:scale-[1.02] transition-transform shadow-lg text-lg">Start Learning</button>
                </form>
              </div>
            </div>`;
            lucide.createIcons({ root: main });
            return;
          }

          renderHeader();

          if (AppState.view === "home") {
            main.innerHTML = `
            <div class="flex flex-col items-center justify-center max-w-4xl mx-auto w-full text-center py-8 sm:py-12 md:py-24 fade-enter fade-enter-active">
              <div class="inline-flex items-center gap-2 px-3 py-1.5 sm:px-4 sm:py-2 rounded-full bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 font-bold text-xs sm:text-sm mb-6 sm:mb-8 shadow-sm"><i data-lucide="sparkles" class="w-3 h-3 sm:w-4 sm:h-4"></i> Welcome to the future of learning</div>
              <h1 class="text-4xl sm:text-6xl md:text-7xl font-extrabold text-slate-900 dark:text-white tracking-tight mb-4 sm:mb-6 leading-tight">Understand Math Visually<br/><span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-purple-500">— Not by Memorizing.</span></h1>
              <p class="text-base sm:text-lg md:text-xl text-slate-600 dark:text-slate-300 mb-8 sm:mb-10 max-w-2xl leading-relaxed font-medium px-4">Learn concepts like slope, derivatives, and probability through interactive visual simulations and guided thinking. No boring worksheets.</p>
              <div class="flex gap-4"><button onclick="window.setView('path')" class="group relative inline-flex items-center justify-center gap-2 sm:gap-3 px-6 py-3 sm:px-8 sm:py-4 bg-slate-900 dark:bg-blue-600 text-white rounded-full font-bold text-base sm:text-lg overflow-hidden transition-all hover:scale-105 shadow-lg"><span class="relative z-10 flex items-center gap-2">Start Learning <i data-lucide="arrow-right" class="w-4 h-4 sm:w-5 sm:h-5 group-hover:translate-x-1 transition-transform"></i></span></button></div>
              <div class="mt-20 sm:mt-24 pt-12 border-t border-slate-200 dark:border-slate-800 w-full">
                <h3 class="text-sm font-bold uppercase tracking-widest text-slate-400 mb-8">How it works</h3>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 sm:gap-8 w-full text-left">
                  <div class="flex flex-col items-center sm:items-start text-center sm:text-left"><div class="w-12 h-12 bg-blue-100 dark:bg-blue-900/50 text-blue-600 rounded-2xl flex items-center justify-center mb-4"><i data-lucide="eye" class="w-6 h-6"></i></div><h3 class="font-extrabold text-xl mb-2">1. Predict</h3><p class="text-slate-500 dark:text-slate-400 text-sm">Look at a scenario and think critically about what will happen.</p></div>
                  <div class="flex flex-col items-center sm:items-start text-center sm:text-left"><div class="w-12 h-12 bg-purple-100 dark:bg-purple-900/50 text-purple-600 rounded-2xl flex items-center justify-center mb-4"><i data-lucide="mouse-pointer-click" class="w-6 h-6"></i></div><h3 class="font-extrabold text-xl mb-2">2. Interact</h3><p class="text-slate-500 dark:text-slate-400 text-sm">Drag sliders and manipulate the visual math engine to solve missions.</p></div>
                  <div class="flex flex-col items-center sm:items-start text-center sm:text-left"><div class="w-12 h-12 bg-emerald-100 dark:bg-emerald-900/50 text-emerald-600 rounded-2xl flex items-center justify-center mb-4"><i data-lucide="lightbulb" class="w-6 h-6"></i></div><h3 class="font-extrabold text-xl mb-2">3. Master</h3><p class="text-slate-500 dark:text-slate-400 text-sm">Experience the "Aha!" moment when the visual connects to the formula.</p></div>
                </div>
              </div>
            </div>`;
          } else if (AppState.view === "path") {
            let treesHtml = SkillPaths.map((path) => {
              let topicNodes = path.topics
                .map((id) => {
                  const data = MathRegistry[id],
                    isCompleted = AppState.completedTopics.includes(data.id);
                  return `<div class="relative z-10 flex items-center gap-4 sm:gap-6 w-full group cursor-pointer" onclick="window.setView('topic', {topicId: '${data.id}'})"><div class="relative shrink-0 flex flex-col items-center justify-center w-12 h-12 sm:w-14 sm:h-14 rounded-full border-4 ${isCompleted ? `border-${data.themeStyles.primary}-500 bg-${data.themeStyles.primary}-500 text-white` : "border-white dark:border-slate-800 bg-slate-100 dark:bg-slate-800 text-slate-300"} z-10 transition-all group-hover:scale-110"><i data-lucide="${isCompleted ? "check" : "lock-open"}" class="w-5 h-5"></i></div><div class="flex-1 glass-panel p-4 sm:p-5 rounded-[1.5rem] transition-all group-hover:-translate-y-1 group-hover:shadow-xl border-l-4 ${isCompleted ? `border-l-${data.themeStyles.primary}-500` : "border-l-transparent"}"><h3 class="text-lg sm:text-xl font-bold mb-1">${data.title.split("(")[0]}</h3></div></div>`;
                })
                .join("");
              return `<div class="mb-16 fade-enter fade-enter-active"><div class="flex items-center gap-4 mb-8"><div class="w-12 h-12 rounded-2xl bg-blue-100 dark:bg-blue-900/40 text-blue-600 flex items-center justify-center"><i data-lucide="${path.icon}" class="w-6 h-6"></i></div><div><h2 class="text-2xl sm:text-3xl font-extrabold">${path.title}</h2><p class="text-slate-500 dark:text-slate-400 font-medium">${path.desc}</p></div></div><div class="relative flex flex-col gap-6 w-full pl-1 sm:pl-2"><div class="absolute left-7 sm:left-9 top-6 bottom-6 w-1.5 bg-white dark:bg-slate-800 shadow-inner rounded-full -translate-x-1/2 z-0"></div>${topicNodes}</div></div>`;
            }).join("");
            main.innerHTML = `<div class="max-w-4xl mx-auto w-full py-6 sm:py-12 px-2 sm:px-0"><h1 class="text-3xl sm:text-4xl font-extrabold mb-2 sm:mb-4">Topic Clusters</h1><p class="text-slate-600 dark:text-slate-300 mb-10 sm:mb-16 text-sm sm:text-lg">Follow a skill tree to master concepts step by step.</p>${treesHtml}</div>`;
          } else if (AppState.view === "friends") {
            const suggestions = getSuggestedFriends();
            let suggestedHtml = suggestions
              .map(
                (s) =>
                  `<div class="glass-panel p-4 rounded-2xl mb-3 flex justify-between items-center"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-green-100 dark:bg-green-900/30 text-green-600 flex items-center justify-center"><i data-lucide="user-plus" class="w-5 h-5"></i></div><div class="font-bold">${s.name} <span class="text-xs font-normal text-slate-500 ml-1">new</span></div></div><button onclick="window.addSuggestedFriend('${s.name}')" class="bg-blue-500 text-white px-4 py-2 rounded-xl text-sm font-bold">Add</button></div>`,
              )
              .join("");
            let fList = AppState.friends
              .map(
                (f) =>
                  `<div class="glass-panel p-4 rounded-2xl mb-3 flex justify-between items-center"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-blue-100 dark:bg-blue-900/50 text-blue-600 flex items-center justify-center"><i data-lucide="user" class="w-5 h-5"></i></div><div class="font-bold">${f.name}</div></div><div class="text-sm font-bold text-slate-500 border border-slate-200 dark:border-slate-700 px-3 py-1 rounded-full">${f.xp} XP</div></div>`,
              )
              .join("");
            main.innerHTML = `
            <div class="max-w-3xl mx-auto w-full py-8">
              <h1 class="text-3xl font-extrabold mb-6 flex items-center gap-3"><i data-lucide="users" class="w-8 h-8 text-blue-500"></i> Friends</h1>
              <div class="flex gap-2 mb-6"><input type="text" id="friend-input" placeholder="Enter username..." class="flex-1 glass-panel px-4 py-3 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 dark:bg-slate-800/80"><button onclick="window.addFriend()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold">Add</button></div>
              ${suggestedHtml ? `<h2 class="font-bold text-lg mb-3 mt-6">Suggested Friends</h2><div class="mb-6">${suggestedHtml}</div>` : ""}
              <h2 class="font-bold text-lg mb-3">Your Friends</h2>
              <div class="max-h-[400px] overflow-y-auto pr-2">${fList || '<p class="text-slate-500 text-center py-8">No friends yet. Add some above!</p>'}</div>
            </div>`;
          } else if (AppState.view === "league") {
            const board = generateLeaderboard();
            let rows = board
              .map(
                (u, i) =>
                  `<div class="flex items-center justify-between p-4 rounded-2xl ${u.isYou ? "bg-blue-500/20 border border-blue-500/50" : "glass-panel dark:bg-slate-800/80"} mb-3"><div class="flex items-center gap-4"><div class="w-8 font-black text-xl opacity-50">#${i + 1}</div><div class="w-10 h-10 rounded-full bg-black/10 flex items-center justify-center"><i data-lucide="user" class="w-5 h-5 opacity-70"></i></div><div class="font-bold">${u.name}</div></div><div class="font-black text-xl text-blue-500">${u.xp} <span class="text-sm opacity-50">XP</span></div></div>`,
              )
              .join("");
            main.innerHTML = `<div class="max-w-3xl mx-auto w-full py-8"><h1 class="text-4xl font-extrabold mb-2 flex items-center gap-3"><i data-lucide="trophy" class="w-10 h-10 text-yellow-500"></i> Diamond League</h1><p class="opacity-70 mb-8 font-medium">Top 3 advance. Complete daily missions to earn XP!</p><div class="flex flex-col">${rows}</div></div>`;
          } else if (AppState.view === "topic") {
            const topic = MathRegistry[AppState.activeTopicId];
            // Build MCQ section with feedback styling
            let mcqHtml = "";
            if (topic.mcq) {
              const mcq = topic.mcq;
              const optionsHtml = mcq.options
                .map((opt, i) => {
                  let btnClass =
                    "glass-btn w-full text-left p-4 rounded-xl font-medium border flex items-center gap-3";
                  let icon = "circle";
                  if (AppState.mcqState !== "idle") {
                    if (i === mcq.correct) {
                      btnClass +=
                        " bg-emerald-100 dark:bg-emerald-900/40 text-emerald-800 border-2 border-emerald-400";
                      icon = "check-circle";
                    } else if (i === AppState.mcqWrongIndex) {
                      btnClass +=
                        " bg-red-100 dark:bg-red-900/40 text-red-800 border-2 border-red-400 shake";
                      icon = "x-circle";
                    } else {
                      btnClass += " opacity-50";
                    }
                  }
                  const disabled =
                    AppState.mcqState !== "idle" ? "disabled" : "";
                  return `<button onclick="window.handleMCQAnswer(${i})" ${disabled} class="${btnClass}"><i data-lucide="${icon}" class="w-5 h-5 shrink-0"></i>${opt}</button>`;
                })
                .join("");
              const explanationVisible =
                AppState.mcqState !== "idle" ? "" : "hidden";
              mcqHtml = `
                <div class="glass-panel rounded-3xl p-6 sm:p-8">
                  <div class="flex items-center gap-2 mb-4"><div class="p-2 rounded-xl bg-purple-100 dark:bg-purple-900/50 text-purple-600"><i data-lucide="globe" class="w-5 h-5"></i></div><h3 class="font-extrabold text-lg">Real World Connection</h3></div>
                  <p class="font-semibold mb-4 text-lg">${mcq.question}</p>
                  <div class="flex flex-col gap-3">${optionsHtml}</div>
                  <div class="real-world-explanation mt-6 p-4 bg-blue-50/80 dark:bg-blue-900/20 border border-blue-200 rounded-2xl ${explanationVisible}">
                    <h4 class="font-bold text-blue-800 dark:text-blue-400 mb-2 flex gap-2"><i data-lucide="info" class="w-4 h-4"></i> Explanation</h4>
                    <p class="text-blue-900 dark:text-blue-200 text-sm">${mcq.explanation}</p>
                  </div>
                </div>
              `;
            }
            main.innerHTML = `
            <article class="max-w-6xl mx-auto w-full fade-enter fade-enter-active">
              <div class="glass-panel px-6 py-8 rounded-3xl mb-8 shadow-sm border border-slate-200 dark:border-slate-700 dark:bg-slate-800/80">
                <h1 class="text-3xl sm:text-4xl font-extrabold mb-4">${topic.title}</h1>
                <h2 class="text-xl font-bold text-blue-600 dark:text-blue-400 mb-4">${topic.hook}</h2>
                <p class="text-slate-700 dark:text-slate-300 font-medium text-lg">${topic.explanation}</p>
                <button onclick="window.renderChallengeModal()" class="mt-6 w-full sm:w-auto bg-gradient-to-r from-pink-500 to-rose-500 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg flex items-center justify-center gap-2"><i data-lucide="swords" class="w-4 h-4"></i> Challenge Friend</button>
              </div>
              <div class="flex flex-col lg:flex-row gap-6 lg:gap-8 min-h-[60vh]">
                <div class="w-full lg:flex-1 relative flex flex-col items-center justify-center h-[40vh] min-h-[300px] sm:h-[50vh] sm:min-h-[400px] lg:h-auto lg:min-h-[500px] z-10"><div id="visualizer-canvas-container" class="w-full h-full absolute inset-0"></div></div>
                <div id="right-panel-container" class="w-full lg:w-[400px] xl:w-[450px] flex flex-col shrink-0"></div>
              </div>
              <div class="mt-12 space-y-6">
                ${mcqHtml}
                ${topic.faqs ? `<div class="glass-panel rounded-3xl p-6 sm:p-8"><h2 class="text-2xl font-extrabold mb-6 flex gap-2"><i data-lucide="help-circle" class="text-blue-500"></i> Frequently Asked Questions</h2><div class="space-y-4">${topic.faqs.map((faq) => `<details class="group bg-white/50 dark:bg-slate-900/50 rounded-2xl border overflow-hidden"><summary class="p-5 font-bold flex justify-between items-center">${faq.q} <i data-lucide="chevron-down" class="w-5 h-5 opacity-50 group-open:rotate-180 transition-transform"></i></summary><div class="px-5 pb-5 text-slate-600 dark:text-slate-400">${faq.a}</div></details>`).join("")}</div></div>` : ""}
              </div>
            </article>`;
            updateVisualizer();
            renderRightPanel();
          }
          lucide.createIcons({ root: main });
        }

        document.addEventListener("DOMContentLoaded", () => {
          if (AppState.isLoggedIn) {
            AppState.view = "home";
          } else {
            AppState.view = "login";
          }
          checkUrlChallenge();
          updateSEO();
          renderApp();
        });
      })();
    </script>
  </body>
</html>
