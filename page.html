<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Math Studio K-12 | Interactive Learning</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Plus Jakarta Sans", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
          },
        },
      };
    </script>

    <!-- Lucide Icons via CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap");

      body {
        background-color: #f8fafc;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
        /* Prevent pull-to-refresh on mobile apps */
        overscroll-behavior-y: none;
      }

      .dark body {
        background-color: #0f172a;
      }

      /* Ambient Background blobs */
      .bg-blobs {
        position: fixed;
        inset: 0;
        z-index: -1;
        overflow: hidden;
        pointer-events: none;
        background-image:
          radial-gradient(
            at 0% 0%,
            hsla(253, 16%, 7%, 0.03) 0,
            transparent 50%
          ),
          radial-gradient(
            at 50% 0%,
            hsla(225, 39%, 30%, 0.03) 0,
            transparent 50%
          ),
          radial-gradient(
            at 100% 0%,
            hsla(339, 49%, 30%, 0.03) 0,
            transparent 50%
          );
      }
      .dark .bg-blobs {
        background-image:
          radial-gradient(
            at 0% 0%,
            hsla(253, 50%, 20%, 0.15) 0,
            transparent 50%
          ),
          radial-gradient(
            at 50% 0%,
            hsla(225, 50%, 20%, 0.15) 0,
            transparent 50%
          ),
          radial-gradient(
            at 100% 0%,
            hsla(339, 50%, 20%, 0.15) 0,
            transparent 50%
          );
      }

      /* Glassmorphism Utilities */
      .glass-panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow:
          0 10px 40px -10px rgba(0, 0, 0, 0.05),
          inset 0 0 0 1px rgba(255, 255, 255, 0.4);
      }
      .dark .glass-panel {
        background: rgba(30, 41, 59, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow:
          0 10px 40px -10px rgba(0, 0, 0, 0.3),
          inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      }

      .glass-btn {
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.9);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .dark .glass-btn {
        background: rgba(30, 41, 59, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .glass-btn:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.9);
        transform: translateY(-2px);
        box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.1);
      }
      .dark .glass-btn:hover:not(:disabled) {
        background: rgba(51, 65, 85, 0.9);
        box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.3);
      }

      svg text {
        user-select: none;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #475569;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }

      input[type="range"] {
        appearance: none;
        background: transparent;
        width: 100%;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 24px;
        width: 24px;
        border-radius: 50%;
        background: #ffffff;
        border: 2px solid currentColor;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        cursor: pointer;
        margin-top: -10px;
      }
      input[type="range"]::-webkit-slider-runnable-track {
        width: 100%;
        height: 6px;
        cursor: pointer;
        background: rgba(120, 120, 120, 0.2);
        border-radius: 10px;
      }

      .blob {
        position: fixed;
        filter: blur(80px);
        z-index: -1;
        opacity: 0.6;
        border-radius: 50%;
        animation: float 20s infinite alternate;
      }
      @keyframes float {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(50px, 50px) scale(1.1);
        }
      }

      details > summary {
        list-style: none;
      }
      details > summary::-webkit-details-marker {
        display: none;
      }
      .viewport-container {
        cursor: grab;
        touch-action: none;
      } /* touch-action none ensures pan gesture is fully captured by JS */
      .viewport-container:active {
        cursor: grabbing;
      }

      /* Animations */
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        75% {
          transform: translateX(5px);
        }
      }
      .shake {
        animation: shake 0.3s ease-in-out;
      }

      .progress-ring__circle {
        transition: stroke-dashoffset 0.5s ease-in-out;
        transform: rotate(-90deg);
        transform-origin: 50% 50%;
      }
    </style>

    <!-- Early Theme Check to prevent flash -->
    <script>
      if (
        localStorage.getItem("theme") === "dark" ||
        (!("theme" in localStorage) &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body
    class="min-h-screen text-slate-800 dark:text-slate-100 flex flex-col relative overflow-x-hidden selection:bg-blue-200 selection:text-blue-900 dark:selection:bg-blue-900 dark:selection:text-blue-100"
  >
    <div class="bg-blobs">
      <div
        class="blob bg-blue-200 dark:bg-blue-900 w-[500px] h-[500px] top-[-100px] left-[-100px]"
      ></div>
      <div
        class="blob bg-purple-200 dark:bg-purple-900 w-[400px] h-[400px] bottom-[-50px] right-[-50px]"
        style="animation-delay: -5s"
      ></div>
      <div
        class="blob bg-emerald-100 dark:bg-emerald-900 w-[300px] h-[300px] top-[40%] left-[30%]"
        style="animation-delay: -10s"
      ></div>
    </div>

    <!-- Responsive Header -->
    <header
      id="app-header"
      class="glass-panel sticky top-2 sm:top-4 mx-2 sm:mx-4 md:mx-8 z-50 rounded-2xl sm:rounded-3xl px-3 sm:px-6 py-2 sm:py-3 flex flex-wrap items-center justify-between gap-2 transition-colors duration-300"
    ></header>

    <!-- Main View Area with responsive padding -->
    <main
      id="app-main"
      class="flex-1 flex flex-col w-full max-w-7xl mx-auto p-3 sm:p-4 md:p-8 mt-2 sm:mt-4 transition-colors duration-300 pb-24"
    ></main>

    <div id="modal-container"></div>
    <div
      id="confetti-container"
      class="fixed inset-0 pointer-events-none z-[200]"
    ></div>

    <script>
      // ============================================================================
      // SYSTEM LAYER 1: CURRICULUM REGISTRY (ALL 14 TOPICS)
      // ============================================================================
      const MathRegistry = {

        },
        g3_frac: {

        g8_lin: {

        if (AppState.lastActiveDate !== today) {

          AppState.lastActiveDate = today;

        if (AppState.progressToday < AppState.dailyGoal) {
          AppState.progressToday++;
          if (AppState.progressToday === AppState.dailyGoal) {
            if (!AppState.streakDays.includes(today)) {
              AppState.streakDays.push(today);
              calculateStreak();
              shootConfetti();

          saveData();
          renderHeader();

      function calculateStreak() {
        let count = 0;
        let d = new Date();
        const todayStr = d.toISOString().split("T")[0];
        d.setDate(d.getDate() - 1);
        const yesterdayStr = d.toISOString().split("T")[0];

        if (
          !AppState.streakDays.includes(todayStr) &&
          !AppState.streakDays.includes(yesterdayStr)
        ) {
          AppState.user.streak = 0;
          return;
        }

        let currentStr = AppState.streakDays.includes(todayStr)
          ? todayStr
          : yesterdayStr;
        let curr = new Date(currentStr);

        while (AppState.streakDays.includes(curr.toISOString().split("T")[0])) {
          count++;
          curr.setDate(curr.getDate() - 1);
        }
        AppState.user.streak = count;
      }

      function shootConfetti() {
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        const colors = ["#3b82f6", "#10b981", "#f59e0b", "#ef4444", "#8b5cf6"];
        const container = document.getElementById("confetti-container");
        for (let i = 0; i < 80; i++) {
          let el = document.createElement("div");
          el.className = "absolute w-3 h-3 rounded-sm";
          el.style.backgroundColor =
            colors[Math.floor(Math.random() * colors.length)];
          el.style.left = "50%";
          el.style.top = "50%";
          const angle = Math.random() * Math.PI * 2;
          const velocity = 8 + Math.random() * 15;
          let vx = Math.cos(angle) * velocity;
          let vy = Math.sin(angle) * velocity - 5;
          let x = 0,
            y = 0,
            frame = 0;
          container.appendChild(el);

          function animate() {
            if (frame > 80) {
              el.remove();
              return;
            }
            x += vx;
            y += vy + frame * 0.4;
            el.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) rotate(${frame * 15}deg)`;
            el.style.opacity = 1 - frame / 80;
            frame++;
            requestAnimationFrame(animate);
          }
          requestAnimationFrame(animate);
        }
      }

      let isDragging = false,
        dragStartX = 0,
        dragStartY = 0;
      function resetViewport() {
        AppState.vp = { x: 0, y: 0, z: 1 };
        applyViewportTransform();
      }
      function applyViewportTransform() {
        const group = document.getElementById("zoom-pan-group");
        if (group)
          group.setAttribute(
            "transform",
            `translate(${AppState.vp.x}, ${AppState.vp.y}) scale(${AppState.vp.z})`,
          );
      }

      function handleTouchStart(e) {
        if (e.touches.length === 1) {
          isDragging = true;
          dragStartX = e.touches[0].clientX - AppState.vp.x;
          dragStartY = e.touches[0].clientY - AppState.vp.y;
        }
      }
      function handleTouchMove(e) {
        if (!isDragging || e.touches.length !== 1) return;
        e.preventDefault(); // Prevent scrolling while panning map
        AppState.vp.x = e.touches[0].clientX - dragStartX;
        AppState.vp.y = e.touches[0].clientY - dragStartY;
        applyViewportTransform();
      }
      function handleTouchEnd() {
        isDragging = false;
      }

      function initViewportEvents(container) {
        container.onwheel = (e) => {
          e.preventDefault();
          const zoomDelta = e.deltaY > 0 ? -0.1 : 0.1;
          AppState.vp.z = Math.max(0.3, Math.min(3, AppState.vp.z + zoomDelta));
          applyViewportTransform();
        };
        container.onmousedown = (e) => {
          isDragging = true;
          dragStartX = e.clientX - AppState.vp.x;
          dragStartY = e.clientY - AppState.vp.y;
        };
        container.onmousemove = (e) => {
          if (!isDragging) return;
          AppState.vp.x = e.clientX - dragStartX;
          AppState.vp.y = e.clientY - dragStartY;
          applyViewportTransform();
        };
        container.onmouseup = () => (isDragging = false);
        container.onmouseleave = () => (isDragging = false);

        // Touch events for mobile
        container.addEventListener("touchstart", handleTouchStart, {
          passive: false,
        });
        container.addEventListener("touchmove", handleTouchMove, {
          passive: false,
        });
        container.addEventListener("touchend", handleTouchEnd);
        container.addEventListener("touchcancel", handleTouchEnd);
      }

      function buildCoordinateSVG(
        innerContent,
        customViewBox = "-10 -10 20 20",
        showGrid = true,
      ) {
        const isDark = document.documentElement.classList.contains("dark");
        const gridColor = isDark ? "#334155" : "#e2e8f0";
        const axisColor = isDark ? "#475569" : "#64748b";
        const textColor = isDark ? "#94a3b8" : "#0f172a";

        let gridHtml = "";
        if (showGrid) {
          gridHtml = `
          <defs><pattern id="gridPattern" width="1" height="1" patternUnits="userSpaceOnUse"><path d="M 1 0 L 0 0 0 1" fill="none" stroke="${gridColor}" stroke-width="0.05" vector-effect="non-scaling-stroke"/></pattern></defs>
          <rect x="-100" y="-100" width="200" height="200" fill="url(#gridPattern)" />
          <line x1="-100" y1="0" x2="100" y2="0" stroke="${axisColor}" stroke-width="0.2" vector-effect="non-scaling-stroke"/>
          <line x1="0" y1="-100" x2="0" y2="100" stroke="${axisColor}" stroke-width="0.2" vector-effect="non-scaling-stroke"/>
        `;
          for (let i = -10; i <= 10; i += 2) {
            if (i !== 0)
              gridHtml += `<text x="${i}" y="-0.3" font-size="0.6" fill="${textColor}" opacity="0.7" text-anchor="middle" transform="scale(1, -1)">${i}</text>`;
            if (i !== 0)
              gridHtml += `<text x="0.3" y="${-i}" font-size="0.6" fill="${textColor}" opacity="0.7" dominant-baseline="middle" transform="scale(1, -1)">${i}</text>`;
          }
          gridHtml += `
          <text x="9.5" y="-0.5" font-size="0.8" font-weight="bold" fill="${textColor}" transform="scale(1, -1)">X</text>
          <text x="0.5" y="-9.5" font-size="0.8" font-weight="bold" fill="${textColor}" transform="scale(1, -1)">Y</text>
          <text x="0.2" y="-0.2" font-size="0.6" fill="${textColor}" transform="scale(1, -1)">0</text>
        `;
        }

        return `
        <svg viewBox="${customViewBox}" class="w-full h-full absolute inset-0 viewport-container rounded-2xl sm:rounded-3xl overflow-hidden">
          <g id="zoom-pan-group" transform="translate(${AppState.vp.x}, ${AppState.vp.y}) scale(${AppState.vp.z})">
            <g transform="scale(1, -1)">
              ${gridHtml}
              ${innerContent}
            </g>
          </g>
        </svg>
        <button onclick="resetViewport()" class="absolute bottom-2 right-2 sm:bottom-4 sm:right-4 bg-white/90 dark:bg-slate-800/90 backdrop-blur border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 px-3 py-1.5 sm:px-4 sm:py-2 rounded-xl text-xs sm:text-sm font-bold shadow-md hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors z-20 flex items-center gap-1 sm:gap-2">
          <i data-lucide="focus" class="w-3 h-3 sm:w-4 sm:h-4"></i> Reset View
        </button>
      `;
      }

      // Graph Renderers
      function renderAreaSVG(p) {
        const isDark = document.documentElement.classList.contains("dark");
        return buildCoordinateSVG(
          `
        <rect x="0" y="0" width="${p.w}" height="${p.h}" fill="rgba(16, 185, 129, 0.2)" stroke="#10b981" stroke-width="0.1" vector-effect="non-scaling-stroke" />
        <text x="${p.w / 2}" y="${-p.h / 2}" font-size="1" fill="${isDark ? "#34d399" : "#064e3b"}" text-anchor="middle" dominant-baseline="middle" transform="scale(1, -1)">Area = ${p.w * p.h}</text>
      `,
          "-2 -2 12 12",
        );
      }

      function renderPythagorasSVG(p) {
        const a2 = p.a * p.a,
          b2 = p.b * p.b,
          c2 = a2 + b2;
        return buildCoordinateSVG(
          `
        <polygon points="0,0 ${p.a},0 ${p.a},${-p.a} 0,${-p.a}" fill="rgba(135,206,235,0.8)" stroke="#0088cc" stroke-width="0.05" vector-effect="non-scaling-stroke" />
        <text x="${p.a / 2}" y="${p.a / 2}" font-size="0.6" font-weight="bold" fill="#000" text-anchor="middle" dominant-baseline="middle" transform="scale(1, -1)">a²=${a2}</text>
        <polygon points="0,0 0,${p.b} ${-p.b},${p.b} ${-p.b},0" fill="rgba(255,182,193,0.8)" stroke="#cc0033" stroke-width="0.05" vector-effect="non-scaling-stroke" />
        <text x="${-p.b / 2}" y="${-p.b / 2}" font-size="0.6" font-weight="bold" fill="#000" text-anchor="middle" dominant-baseline="middle" transform="scale(1, -1)">b²=${b2}</text>
        <polygon points="${p.a},0 0,${p.b} ${p.b},${p.b + p.a} ${p.a + p.b},${p.a}" fill="rgba(200,162,200,0.8)" stroke="#8a2be2" stroke-width="0.05" vector-effect="non-scaling-stroke" />
        <g transform="translate(${(p.a + p.b) / 2}, ${(p.b + p.a) / 2}) rotate(${-Math.atan2(p.b, p.a) * (180 / Math.PI)})">
           <text x="0" y="0" font-size="0.6" font-weight="bold" fill="#000" text-anchor="middle" dominant-baseline="middle" transform="scale(1, -1)">c²=${c2}</text>
        </g>
        <polygon points="0,0 ${p.a},0 0,${p.b}" fill="rgba(180,180,180,0.8)" stroke="#666" stroke-width="0.05" vector-effect="non-scaling-stroke" />
      `,
          "-10 -10 20 20",
        );
      }

      function renderLinearSVG(p) {
        return buildCoordinateSVG(`
        <line x1="-10" y1="${p.m * -10 + p.b}" x2="10" y2="${p.m * 10 + p.b}" stroke="#a855f7" stroke-width="0.15" vector-effect="non-scaling-stroke"/>
        <circle cx="0" cy="${p.b}" r="0.4" fill="#f43f5e" />
      `);
      }

      function renderSystemSVG(p) {
        return buildCoordinateSVG(`
        <line x1="-10" y1="${p.m1 * -10 + p.b1}" x2="10" y2="${p.m1 * 10 + p.b1}" stroke="#6366f1" stroke-width="0.15" vector-effect="non-scaling-stroke"/>
        <line x1="-10" y1="${p.m2 * -10 + p.b2}" x2="10" y2="${p.m2 * 10 + p.b2}" stroke="#06b6d4" stroke-width="0.15" vector-effect="non-scaling-stroke"/>
        ${p.m1 !== p.m2 ? `<circle cx="${(p.b2 - p.b1) / (p.m1 - p.m2)}" cy="${p.m1 * ((p.b2 - p.b1) / (p.m1 - p.m2)) + p.b1}" r="0.4" fill="#10b981"/>` : ""}
      `);
      }

      function renderScatterSVG(p) {
        let pts = "";
        for (let i = -8; i <= 8; i += 1.5) {
          let noise = Math.sin(i * 123) * 3 * (1 - Math.abs(p.r));
          pts += `<circle cx="${i}" cy="${i * p.r + noise}" r="0.3" fill="#0284c7" />`;
        }
        return buildCoordinateSVG(
          pts +
            `<line x1="-10" y1="${-10 * p.r}" x2="10" y2="${10 * p.r}" stroke="#f43f5e" stroke-width="0.05" stroke-dasharray="0.2" vector-effect="non-scaling-stroke"/>`,
        );
      }

      function renderQuadSVG(p) {
        let path = `M -10 ${p.a * 100 - p.b * 10 + p.c} `;
        for (let x = -10; x <= 10; x += 0.5)
          path += `L ${x} ${p.a * x * x + p.b * x + p.c} `;
        return buildCoordinateSVG(
          `<path d="${path}" fill="none" stroke="#ef4444" stroke-width="0.15" vector-effect="non-scaling-stroke" />`,
        );
      }

      function renderSineSVG(p) {
        let path = `M -10 ${p.a * Math.sin(-10 * p.f)} `;
        for (let x = -10; x <= 10; x += 0.2)
          path += `L ${x} ${p.a * Math.sin(x * p.f)} `;
        return buildCoordinateSVG(
          `<path d="${path}" fill="none" stroke="#06b6d4" stroke-width="0.15" vector-effect="non-scaling-stroke" />`,
        );
      }

      function renderDerivSVG(p) {
        const a = 0.5,
          c = -2;
        let path = `M -10 ${a * 100 + c} `;
        for (let x = -10; x <= 10; x += 0.5) path += `L ${x} ${a * x * x + c} `;
        const y = a * p.x * p.x + c,
          m = 2 * a * p.x;
        const tanPath = `M -10 ${m * (-10 - p.x) + y} L 10 ${m * (10 - p.x) + y}`;
        return buildCoordinateSVG(`
        <path d="${path}" fill="none" stroke="#64748b" stroke-width="0.1" vector-effect="non-scaling-stroke" />
        <path d="${tanPath}" fill="none" stroke="#d946ef" stroke-width="0.15" vector-effect="non-scaling-stroke" />
        <circle cx="${p.x}" cy="${y}" r="0.4" fill="#d946ef" />
      `);
      }

      function renderIntegralSVG(p) {
        const a = -0.2,
          c = 4;
        let path = `M -10 ${a * 100 + c} `;
        for (let x = -10; x <= 10; x += 0.5) path += `L ${x} ${a * x * x + c} `;
        let fill = `M ${p.x1} 0 `;
        for (let x = p.x1; x <= p.x2; x += 0.2)
          fill += `L ${x} ${a * x * x + c} `;
        fill += `L ${p.x2} 0 Z`;
        return buildCoordinateSVG(`
        <path d="${fill}" fill="rgba(139, 92, 246, 0.4)" />
        <path d="${path}" fill="none" stroke="#8b5cf6" stroke-width="0.15" vector-effect="non-scaling-stroke" />
        <line x1="${p.x1}" y1="0" x2="${p.x1}" y2="${a * p.x1 * p.x1 + c}" stroke="#6d28d9" stroke-width="0.1" stroke-dasharray="0.2" vector-effect="non-scaling-stroke"/>
        <line x1="${p.x2}" y1="0" x2="${p.x2}" y2="${a * p.x2 * p.x2 + c}" stroke="#6d28d9" stroke-width="0.1" stroke-dasharray="0.2" vector-effect="non-scaling-stroke"/>
      `);
      }

      function renderVectorSVG(p) {
        return buildCoordinateSVG(`
        <line x1="0" y1="0" x2="${p.vx}" y2="${p.vy}" stroke="#84cc16" stroke-width="0.15" vector-effect="non-scaling-stroke" marker-end="url(#arrow)"/>
        <circle cx="${p.vx}" cy="${p.vy}" r="0.3" fill="#4d7c0f"/>
        <defs><marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#84cc16" /></marker></defs>
      `);
      }

      function renderNumLineSVG(p) {
        const isDark = document.documentElement.classList.contains("dark");
        return buildCoordinateSVG(
          `
        <line x1="-10" y1="0" x2="10" y2="0" stroke="${isDark ? "#cbd5e1" : "#000"}" stroke-width="0.1" vector-effect="non-scaling-stroke" />
        <path d="M ${p.a} 0 Q ${(p.a * 2 + p.b) / 2} 3 ${p.a + p.b} 0" fill="none" stroke="#f97316" stroke-width="0.15" vector-effect="non-scaling-stroke" marker-end="url(#arrow-nl)" />
        <circle cx="${p.a}" cy="0" r="0.3" fill="#ea580c"/>
        <circle cx="${p.a + p.b}" cy="0" r="0.3" fill="#ea580c"/>
        <defs><marker id="arrow-nl" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316" /></marker></defs>
      `,
          "-2 -5 14 10",
          false,
        );
      }

      function renderPieSVG(p) {
        let slices = "";
        for (let i = 0; i < p.d; i++) {
          let a1 = (i / p.d) * Math.PI * 2,
            a2 = ((i + 1) / p.d) * Math.PI * 2;
          let x1 = 5 * Math.cos(a1),
            y1 = 5 * Math.sin(a1);
          let x2 = 5 * Math.cos(a2),
            y2 = 5 * Math.sin(a2);
          let fill =
            i < p.n ? "rgba(244, 63, 94, 0.8)" : "rgba(226, 232, 240, 0.3)";
          slices += `<path d="M 0 0 L ${x1} ${y1} A 5 5 0 0 1 ${x2} ${y2} Z" fill="${fill}" stroke="${document.documentElement.classList.contains("dark") ? "#1e293b" : "#fff"}" stroke-width="0.1" vector-effect="non-scaling-stroke"/>`;
        }
        return buildCoordinateSVG(slices, "-6 -6 12 12", false);
      }

      // ============================================================================
      // SYSTEM LAYER 3: CORE LOGIC & RENDERING
      // ============================================================================

      function setView(view, payload = null) {
        AppState.view = view;
        if (payload?.grade) AppState.activeGrade = payload.grade;
        if (payload?.topicId) {
          AppState.activeTopicId = payload.topicId;
          AppState.params = { ...MathRegistry[payload.topicId].initialParams };
          AppState.challengeIndex = 0;
          AppState.challengeState = "idle";
          AppState.mcqState = "idle";
          AppState.mcqWrongIndex = null;
          resetViewport();
          startHintTimer();
        }
        renderApp();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function startHintTimer() {
        clearTimeout(AppState.hintTimer);
        AppState.hintTimer = setTimeout(() => {
          if (AppState.challengeState === "idle") {
            AppState.challengeState = "hint";
            renderChallengeBox();
          }
        }, 12000);
      }

      function nextChallenge() {
        const topic = MathRegistry[AppState.activeTopicId];
        if (AppState.challengeIndex < topic.challenges.length - 1) {
          AppState.challengeIndex++;
          AppState.challengeState = "idle";
          renderChallengeBox();
          renderSliders();
          startHintTimer();
        } else {
          if (!AppState.completedTopics.includes(AppState.activeTopicId)) {
            AppState.completedTopics.push(AppState.activeTopicId);
            saveData();
            shootConfetti();
          }
          setView("path");
        }
      }

      function handleParamChange(controlId, value) {
        const numVal = parseFloat(value);
        if (!isNaN(numVal)) {
          AppState.params[controlId] = numVal;
          const s = document.getElementById(`slider_input_${controlId}`);
          const n = document.getElementById(`number_input_${controlId}`);
          if (s) s.value = numVal;
          if (n) n.value = numVal;

          updateVisualizer();
          evaluateChallenge();
        }
      }

      function evaluateChallenge() {
        if (AppState.challengeState === "solved") return;
        const topic = MathRegistry[AppState.activeTopicId];
        const challenge = topic.challenges[AppState.challengeIndex];

        if (challenge.check(AppState.params)) {
          AppState.challengeState = "solved";
          AppState.user.xp += 50;
          clearTimeout(AppState.hintTimer);
          if (navigator.vibrate) navigator.vibrate(50);
          incrementDailyProgress();
          renderChallengeBox();
          renderSliders();
        }
      }

      function handleMCQAnswer(index) {
        if (AppState.mcqState === "correct") return;
        const topic = MathRegistry[AppState.activeTopicId];

        if (index === topic.mcq.correct) {
          AppState.mcqState = "correct";
          AppState.user.xp += 25;
          incrementDailyProgress();
          if (navigator.vibrate) navigator.vibrate(50);
        } else {
          AppState.mcqState = "incorrect";
          AppState.mcqWrongIndex = index;
          if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
        }
        renderMCQSection();
      }

      function retryMCQ() {
        AppState.mcqState = "idle";
        AppState.mcqWrongIndex = null;
        renderMCQSection();
      }

      function toggleTheme() {
        const html = document.documentElement;
        const isDark = html.classList.toggle("dark");
        localStorage.setItem("theme", isDark ? "dark" : "light");
        updateVisualizer();
      }

      // Modal Routing
      function openModal(type) {
        const modal = document.getElementById("modal-container");
        if (type === "profile") renderProfileModal(modal);
        else if (type === "calendar") renderCalendarModal(modal);
      }
      function closeModal() {
        document.getElementById("modal-container").innerHTML = "";
      }

      function updateProfile(e) {
        e.preventDefault();
        const input = document.getElementById("profile-name-input").value;
        if (input.trim()) {
          AppState.user.name = input.trim();
          saveData();
          closeModal();
          renderHeader();
          if (AppState.view === "home") renderApp();
        }
      }

      function updateVisualizer() {
        const container = document.getElementById(
          "visualizer-canvas-container",
        );
        if (!container) return;
        const p = AppState.params,
          id = AppState.activeTopicId;

        if (id === "g1_add") container.innerHTML = renderNumLineSVG(p);
        else if (id === "g3_frac") container.innerHTML = renderPieSVG(p);
        else if (id === "g4_area") container.innerHTML = renderAreaSVG(p);
        else if (id === "g8_lin") container.innerHTML = renderLinearSVG(p);
        else if (id === "g8_sys") container.innerHTML = renderSystemSVG(p);
        else if (id === "g8_scat") container.innerHTML = renderScatterSVG(p);
        else if (id === "g8_pyth") container.innerHTML = renderPythagorasSVG(p);
        else if (id === "g9_quad") container.innerHTML = renderQuadSVG(p);
        else if (id === "g10_sine") container.innerHTML = renderSineSVG(p);
        else if (id === "g11_deriv") container.innerHTML = renderDerivSVG(p);
        else if (id === "g12_int") container.innerHTML = renderIntegralSVG(p);
        else if (id === "g12_vec") container.innerHTML = renderVectorSVG(p);
        else
          container.innerHTML = buildCoordinateSVG(
            `<text x="0" y="0" font-size="1" fill="#64748b" text-anchor="middle" transform="scale(1, -1)">Visualization Active</text>`,
          );

        initViewportEvents(container.firstElementChild);
      }

      // Ring progress logic
      function getRingDashOffset(progress, total) {
        const circumference = 2 * Math.PI * 16;
        const pct = progress / total;
        return circumference - pct * circumference;
      }

      function renderHeader() {
        const header = document.getElementById("app-header");
        calculateStreak();

        const circumference = 2 * Math.PI * 16;
        const offset = getRingDashOffset(
          AppState.progressToday,
          AppState.dailyGoal,
        );

        let backBtnHtml =
          AppState.view !== "home"
            ? `<button onclick="setView('${AppState.view === "topic" ? "path" : "home"}')" class="glass-btn p-2 sm:p-2.5 rounded-full flex items-center justify-center text-slate-600 dark:text-slate-300 shadow-sm"><i data-lucide="arrow-left" class="w-4 h-4 sm:w-5 sm:h-5"></i></button>`
            : `<div class="w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center bg-blue-600 text-white rounded-full font-bold shadow-lg shadow-blue-500/30 text-sm sm:text-base">M</div>`;

        header.innerHTML = `
        <div class="flex items-center gap-2 sm:gap-4">
          ${backBtnHtml}
          <h1 class="hidden sm:block text-lg sm:text-xl font-extrabold tracking-tight">Math<span class="text-blue-600 dark:text-blue-400">Studio</span></h1>
        </div>

        <div class="flex items-center gap-1.5 sm:gap-3 md:gap-5">
          <button onclick="toggleTheme()" class="glass-btn p-2 rounded-full text-slate-600 dark:text-slate-300" aria-label="Toggle Theme">
             <i data-lucide="sun" class="w-4 h-4 sm:w-5 sm:h-5 hidden dark:block"></i>
             <i data-lucide="moon" class="w-4 h-4 sm:w-5 sm:h-5 block dark:hidden"></i>
          </button>

          <!-- Leagues Tab Button -->
          <button onclick="setView('league')" class="glass-btn p-2 rounded-full text-yellow-600 dark:text-yellow-400" title="Leaderboard">
            <i data-lucide="trophy" class="w-4 h-4 sm:w-5 sm:h-5"></i>
          </button>

          <!-- Friends Tab Button -->
          <button onclick="setView('friends')" class="relative glass-btn p-2 rounded-full text-pink-500 dark:text-pink-400" title="Friends & Challenges">
            <i data-lucide="users" class="w-4 h-4 sm:w-5 sm:h-5"></i>
            ${AppState.incomingChallenges.length > 0 ? `<span class="absolute -top-1 -right-1 bg-pink-500 text-white text-[9px] sm:text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center">${AppState.incomingChallenges.length}</span>` : ""}
          </button>
          
          <button onclick="openModal('calendar')" class="relative flex items-center justify-center w-10 h-10 sm:w-12 sm:h-12 group" title="Daily Goal: ${AppState.progressToday}/${AppState.dailyGoal}">
            <svg class="absolute inset-0 w-full h-full text-slate-200 dark:text-slate-700" viewBox="0 0 36 36">
              <circle stroke="currentColor" stroke-width="3" fill="transparent" r="16" cx="18" cy="18" />
              <circle class="text-orange-500 progress-ring__circle" stroke="currentColor" stroke-width="3" fill="transparent" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round" r="16" cx="18" cy="18" />
            </svg>
            <i data-lucide="flame" class="w-4 h-4 sm:w-5 sm:h-5 text-orange-500 z-10 group-hover:scale-110 transition-transform ${AppState.progressToday >= AppState.dailyGoal ? "fill-orange-500" : ""}"></i>
          </button>

          <div class="hidden md:flex items-center gap-2 text-blue-600 dark:text-blue-400 font-bold glass-panel px-3 py-1.5 rounded-2xl shadow-sm text-sm"><i data-lucide="award" class="w-4 h-4 sm:w-5 sm:h-5"></i><span>${AppState.user.xp} XP</span></div>
          
          <button onclick="openModal('profile')" class="glass-btn pl-1.5 pr-3 sm:pl-2 sm:pr-4 py-1.5 rounded-full flex items-center gap-2 border border-slate-200 shadow-sm group">
            <div class="w-7 h-7 sm:w-8 sm:h-8 rounded-full bg-gradient-to-tr from-purple-500 to-blue-500 text-white flex items-center justify-center shadow-inner group-hover:scale-105 transition-transform"><i data-lucide="user" class="w-3 h-3 sm:w-4 sm:h-4"></i></div>
            <span class="font-bold text-xs sm:text-sm hidden sm:block">${AppState.user.name}</span>
          </button>
        </div>
      `;
        lucide.createIcons({ root: header });
      }

      function renderCalendarModal(modal) {
        const today = new Date();
        const monthStr = today.toLocaleString("default", {
          month: "long",
          year: "numeric",
        });

        const firstDay = new Date(
          today.getFullYear(),
          today.getMonth(),
          1,
        ).getDay();
        const daysInMonth = new Date(
          today.getFullYear(),
          today.getMonth() + 1,
          0,
        ).getDate();

        let gridHtml = "";
        const daysOfWeek = ["S", "M", "T", "W", "T", "F", "S"];
        daysOfWeek.forEach(
          (d) =>
            (gridHtml += `<div class="text-center text-xs font-bold text-slate-400 mb-2">${d}</div>`),
        );

        for (let i = 0; i < firstDay; i++) gridHtml += `<div></div>`;

        for (let d = 1; d <= daysInMonth; d++) {
          const dateStr = new Date(today.getFullYear(), today.getMonth(), d, 12)
            .toISOString()
            .split("T")[0];
          const isStreak = AppState.streakDays.includes(dateStr);
          const isToday = dateStr === getTodayStr();

          let classes =
            "w-8 h-8 sm:w-10 sm:h-10 mx-auto rounded-full flex items-center justify-center text-xs sm:text-sm font-bold transition-all ";
          if (isStreak)
            classes +=
              "bg-gradient-to-tr from-orange-400 to-amber-500 text-white shadow-lg shadow-orange-500/30";
          else if (isToday)
            classes +=
              "border-2 border-slate-300 dark:border-slate-600 text-slate-800 dark:text-slate-200";
          else
            classes +=
              "text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800";

          gridHtml += `<div><div class="${classes}">${d}</div></div>`;
        }

        modal.innerHTML = `
        <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-in fade-in duration-200">
          <div class="glass-panel w-full max-w-sm rounded-3xl p-6 sm:p-8 relative shadow-2xl dark:bg-slate-900 max-h-[90vh] overflow-y-auto">
            <button onclick="closeModal()" class="absolute top-4 right-4 p-2 text-slate-400 hover:text-slate-800 dark:hover:text-white transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
            <div class="text-center mb-6">
              <div class="inline-flex items-center justify-center w-12 h-12 sm:w-16 sm:h-16 rounded-full bg-orange-100 dark:bg-orange-900/30 text-orange-500 mb-4"><i data-lucide="flame" class="w-6 h-6 sm:w-8 sm:h-8 fill-orange-500"></i></div>
              <h2 class="text-xl sm:text-2xl font-extrabold text-slate-800 dark:text-white">${AppState.user.streak} Day Streak</h2>
              <p class="text-slate-500 dark:text-slate-400 text-sm sm:text-base font-medium mt-1">Complete ${AppState.dailyGoal} missions daily to keep it alive!</p>
            </div>
            <div class="bg-white/50 dark:bg-slate-800/50 rounded-2xl p-4 shadow-inner border border-white/50 dark:border-slate-700/50">
              <h3 class="text-center font-bold text-slate-700 dark:text-slate-200 mb-4">${monthStr}</h3>
              <div class="grid grid-cols-7 gap-y-1 sm:gap-y-2">${gridHtml}</div>
            </div>
          </div>
        </div>
      `;
        lucide.createIcons({ root: modal });
      }

      function renderProfileModal(modal) {
        modal.innerHTML = `
        <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-in fade-in duration-200">
          <div class="glass-panel w-full max-w-sm rounded-3xl p-6 sm:p-8 relative shadow-2xl dark:bg-slate-900 max-h-[90vh] overflow-y-auto">
            <button onclick="closeModal()" class="absolute top-4 right-4 p-2 text-slate-400 hover:text-slate-800 dark:hover:text-white transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
            <div class="flex flex-col items-center mb-6">
              <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-full bg-gradient-to-tr from-purple-500 to-blue-500 text-white flex items-center justify-center shadow-lg mb-4"><i data-lucide="user" class="w-8 h-8 sm:w-10 sm:h-10"></i></div>
              <h2 class="text-xl sm:text-2xl font-extrabold text-slate-800 dark:text-white">Your Profile</h2>
            </div>
            <form onsubmit="updateProfile(event)" class="flex flex-col gap-4">
              <div>
                <label class="block text-sm font-bold text-slate-500 dark:text-slate-400 mb-1 ml-1">Explorer Name</label>
                <input id="profile-name-input" type="text" value="${AppState.user.name}" class="w-full bg-white/50 dark:bg-slate-800/50 border border-white dark:border-slate-700 focus:border-blue-400 dark:focus:border-blue-500 focus:ring-4 focus:ring-blue-100 dark:focus:ring-blue-900/30 rounded-2xl px-4 py-3 outline-none font-bold text-slate-800 dark:text-white transition-all shadow-inner" required>
              </div>
              <div class="flex justify-between bg-white/40 dark:bg-slate-800/40 p-4 rounded-2xl border border-white dark:border-slate-700 mt-2 shadow-inner">

          main.innerHTML = `
          <div class="max-w-3xl mx-auto w-full py-6 sm:py-8 md:py-12 px-2 sm:px-0">
            <button onclick="setView('grades')" class="mb-6 sm:mb-8 flex items-center gap-1.5 sm:gap-2 text-slate-500 hover:text-slate-800 dark:hover:text-slate-200 font-bold transition-colors text-sm sm:text-base"><i data-lucide="arrow-left" class="w-4 h-4 sm:w-5 sm:h-5"></i> Back to Grades</button>
            <h1 class="text-3xl sm:text-4xl font-extrabold mb-1 sm:mb-2 text-slate-900 dark:text-white">${gradeObj.label} Journey</h1>
            <p class="text-slate-600 dark:text-slate-300 mb-10 sm:mb-16 text-sm sm:text-lg">Complete the missions below to master this level.</p>
            <div class="relative flex flex-col gap-8 sm:gap-12 md:gap-16 w-full pl-1 sm:pl-2 md:pl-0">
              <div class="absolute left-7 sm:left-9 md:left-8 top-6 bottom-6 w-1.5 bg-white dark:bg-slate-800 shadow-inner rounded-full -translate-x-1/2 z-0"></div>
              ${pathHtml}
            </div>
          </div>
        `;
          lucide.createIcons({ root: main });
        } else if (AppState.view === "topic") {
          const topic = MathRegistry[AppState.activeTopicId];

          main.innerHTML = `
          <div class="max-w-6xl mx-auto w-full">
            <div class="glass-panel px-4 sm:px-6 py-3 sm:py-4 rounded-2xl sm:rounded-3xl mb-4 sm:mb-6 shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-4 justify-between dark:bg-slate-800/80">
              <div class="flex-1">
                <h3 class="text-[10px] sm:text-xs font-extrabold uppercase text-slate-400 mb-0.5 sm:mb-1 tracking-wider">${topic.domain}</h3>
                <h2 class="text-xl sm:text-2xl font-bold text-slate-800 dark:text-white">${topic.title}</h2>
              </div>
              <p class="text-slate-600 dark:text-slate-300 font-medium text-xs sm:text-sm bg-white/60 dark:bg-slate-900/60 px-3 sm:px-4 py-1.5 sm:py-2 rounded-lg sm:rounded-xl border border-slate-200/60 dark:border-slate-700/60 hidden md:block">${topic.scenario}</p>
              <button onclick="renderChallengeModal()" class="shrink-0 w-full sm:w-auto bg-gradient-to-r from-pink-500 to-rose-500 text-white px-4 py-2 sm:px-5 sm:py-2.5 rounded-xl font-bold shadow-lg shadow-pink-500/30 hover:scale-105 transition-transform flex items-center justify-center gap-1.5 sm:gap-2 text-sm sm:text-base">
                <i data-lucide="swords" class="w-4 h-4"></i> Challenge Friend
              </button>
            </div>

            <div class="flex flex-col lg:flex-row gap-4 sm:gap-6 lg:gap-8">
              <!-- Graph takes upper half on mobile landscape, full height on desktop -->
              <div class="w-full lg:flex-1 relative flex flex-col items-center justify-center h-[40vh] min-h-[300px] sm:h-[50vh] sm:min-h-[400px] lg:h-auto lg:min-h-[500px] z-10">
                 <div id="visualizer-canvas-container" class="w-full h-full absolute inset-0 rounded-2xl sm:rounded-3xl shadow-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 overflow-hidden"></div>
              </div>
              <!-- Right controls area -->
              <div class="w-full lg:w-[350px] xl:w-[450px] flex flex-col gap-4 sm:gap-6 shrink-0">
                <div id="challenge-container"></div>
                <div id="sliders-container" class="flex flex-col gap-3 sm:gap-4"></div>
              </div>
            </div>

            <div id="mcq-container"></div>
            
            <details class="glass-panel rounded-2xl sm:rounded-3xl overflow-hidden group cursor-pointer mb-12 sm:mb-20 shadow-sm border border-slate-200 dark:border-slate-700 dark:bg-slate-800/80 mt-4 sm:mt-0">
              <summary class="p-4 sm:p-6 md:p-8 font-extrabold text-base sm:text-lg text-slate-800 dark:text-white flex items-center justify-between hover:bg-white/40 dark:hover:bg-slate-700/40 transition-colors outline-none">
                <div class="flex items-center gap-2 sm:gap-3"><div class="p-1.5 sm:p-2 rounded-lg sm:rounded-xl bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300"><i data-lucide="book-open" class="w-4 h-4 sm:w-5 sm:h-5"></i></div> Read Deep Dive</div>
                <i data-lucide="chevron-down" class="w-5 h-5 sm:w-6 sm:h-6 text-slate-400 group-open:rotate-180 transition-transform"></i>
              </summary>
              <div class="px-5 sm:px-6 pb-6 sm:pb-8 md:px-8 pt-0 border-t border-slate-200/50 dark:border-slate-700/50 text-slate-700 dark:text-slate-300 font-medium leading-relaxed bg-white/30 dark:bg-slate-800/30 text-sm sm:text-base"><p class="mt-4 sm:mt-6">${topic.detailText}</p></div>
            </details>
          </div>
        `;

          updateVisualizer();
          renderChallengeBox();
          renderSliders();
          renderMCQSection();
          lucide.createIcons({ root: main });
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        checkUrlChallenge();
        if (AppState.view === "home") renderApp();
      });
    </script>
  </body>
</html>
